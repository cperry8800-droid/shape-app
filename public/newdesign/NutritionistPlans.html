<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Plans · Shape</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>html,body{margin:0;padding:0;background:#1a1612}*{box-sizing:border-box}a{text-decoration:none;color:inherit}</style>
</head>
<body><div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="pageShell.jsx"></script>
<script type="text/babel" src="trainerDashboard.jsx"></script>
<script type="text/babel" src="coachNav.jsx"></script>
<script type="text/babel" src="aiGenerator.jsx"></script>
<script type="text/babel">
function PlanTabs({ value, onChange }) {
  const items = [
    ["plans", "Meal plans", "Recurring subscriptions"],
    ["templates", "Templates", "Reusable frameworks"],
    ["oneTime", "One-time", "Guides + meal banks"],
    ["playlists", "Playlists", "Cooking + prep music"],
  ];
  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 10, marginBottom: 20 }}>
      {items.map(([key, label, sub]) => (
        <button key={key} onClick={() => onChange(key)} style={{
          textAlign: "left",
          padding: "14px 16px",
          borderRadius: 10,
          border: value === key ? `1px solid ${TEAL_BRIGHT}` : "1px solid rgba(242,237,228,0.12)",
          background: value === key ? "rgba(30,192,168,0.08)" : "rgba(242,237,228,0.035)",
          color: INK,
          cursor: "pointer",
        }}>
          <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: "0.14em", color: value === key ? TEAL_BRIGHT : "rgba(242,237,228,0.55)", textTransform: "uppercase" }}>{label}</div>
          <div style={{ marginTop: 5, fontSize: 12.5, color: "rgba(242,237,228,0.62)" }}>{sub}</div>
        </button>
      ))}
    </div>
  );
}

function ProductGrid({ items, title, meta }) {
  return (
    <>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 16, marginBottom: 20 }}>
        {items.map((p) => (
          <Card key={p.t} style={{ padding: 22 }}>
            <div style={{ height: 132, borderRadius: 8, background: `linear-gradient(135deg, ${p.color}, rgba(242,237,228,0.04))`, marginBottom: 16, display: "flex", alignItems: "flex-end", padding: 14 }}>
              <Pill>{p.tag}</Pill>
            </div>
            <div style={{ fontFamily: serif, fontSize: 20, letterSpacing: "-0.01em", marginBottom: 10 }}>{p.t}</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, fontSize: 11.5, color: "rgba(242,237,228,0.55)", fontFamily: "'JetBrains Mono', monospace", letterSpacing: "0.06em" }}>
              <div><div style={{ color: INK, fontFamily: "Fraunces", fontSize: 18 }}>{p.active}</div>ACTIVE</div>
              <div><div style={{ color: INK, fontFamily: "Fraunces", fontSize: 18 }}>{p.sold}</div>SOLD</div>
              <div><div style={{ color: INK, fontFamily: "Fraunces", fontSize: 18 }}>{p.price.replace("/mo","")}</div>{p.price.includes("/mo") ? "/MO" : "ONE"}</div>
            </div>
          </Card>
        ))}
      </div>
      <Card>
        <SectionTitle right={meta}>{title}</SectionTitle>
        {items.map((p, i) => (
          <div key={p.t} style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 1fr 120px", gap: 14, padding: "14px 4px", borderTop: i === 0 ? "none" : "1px solid rgba(242,237,228,0.06)", alignItems: "center" }}>
            <div>
              <div style={{ fontSize: 14, fontWeight: 500 }}>{p.t}</div>
              <div style={{ fontSize: 11.5, color: "rgba(242,237,228,0.5)" }}>{p.tag.toLowerCase()}</div>
            </div>
            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12 }}>{p.active} active</span>
            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12 }}>{p.sold} sold</span>
            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12, color: TEAL_BRIGHT }}>{p.price}</span>
            <div style={{ height: 6, background: "rgba(242,237,228,0.08)", borderRadius: 999, overflow: "hidden" }}>
              <div style={{ height: "100%", width: `${Math.min(p.sold / 38 * 100, 100)}%`, background: TEAL }} />
            </div>
          </div>
        ))}
      </Card>
    </>
  );
}

function PlaylistStudio({ drafts = [] }) {
  const playlistItems = [
    ...drafts,
    { name: "Meal prep, low-key", sub: "Apple Music - Protein-led cut", meta: "54 min" },
    { name: "Kitchen reset", sub: "Spotify - templates", meta: "28 tracks" },
    { name: "Race-week calm", sub: "Apple Music - Race-day fueling", meta: "42 min" },
  ];
  return (
    <Card style={{ borderColor: "rgba(30,192,168,0.24)" }}>
      <SectionTitle right="ATTACH TO MEAL PLANS, TEMPLATES, OR GUIDES">Playlist studio</SectionTitle>
      <div style={{ display: "grid", gridTemplateColumns: "1.1fr 1fr", gap: 16 }}>
        <div>
          <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: "0.12em", color: TEAL_BRIGHT, marginBottom: 8 }}>NEW PLAYLIST</div>
          <input defaultValue="Meal prep, low-key" style={{ width: "100%", background: "rgba(242,237,228,0.04)", color: INK, border: "1px solid rgba(242,237,228,0.1)", borderRadius: 8, padding: "10px 12px", fontSize: 14, outline: "none", marginBottom: 10 }} />
          <input defaultValue="https://music.apple.com/playlist/shape-prep" style={{ width: "100%", background: "rgba(242,237,228,0.04)", color: INK, border: "1px solid rgba(242,237,228,0.1)", borderRadius: 8, padding: "10px 12px", fontFamily: "'JetBrains Mono', monospace", fontSize: 11, outline: "none", marginBottom: 10 }} />
          <select defaultValue="Protein-led cut (10w)" style={{ width: "100%", background: "#211d18", color: INK, border: "1px solid rgba(242,237,228,0.1)", borderRadius: 8, padding: "10px 12px", fontSize: 14, outline: "none" }}>
            <option>Protein-led cut (10w)</option>
            <option>High-protein breakfast bank</option>
            <option>Travel nutrition guide</option>
          </select>
          <button style={{ marginTop: 12, background: TEAL, color: PAPER, border: 0, padding: "11px 16px", borderRadius: 8, fontFamily: sans, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>Import and attach</button>
        </div>
        <div style={{ display: "grid", gap: 10 }}>
          {playlistItems.map(({ name, sub, meta }) => (
            <div key={name} style={{ padding: 14, border: "1px solid rgba(242,237,228,0.08)", borderRadius: 10, background: "rgba(242,237,228,0.025)" }}>
              <div style={{ fontSize: 15, fontWeight: 600 }}>{name}</div>
              <div style={{ marginTop: 4, fontSize: 12.5, color: "rgba(242,237,228,0.58)" }}>{sub}</div>
              <div style={{ marginTop: 9, fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: "0.1em", color: TEAL_BRIGHT }}>{meta}</div>
            </div>
          ))}
        </div>
      </div>
    </Card>
  );
}

function NewAssetComposer({ tab, onCreate, onClose }) {
  const config = {
    plans: {
      eyebrow: "NEW MEAL PLAN",
      title: "New meal-plan subscription",
      defaultTitle: "New performance meal plan",
      defaultPrice: "$160/mo",
      tag: "DRAFT PLAN",
      color: "rgba(30,192,168,0.22)",
      helper: "Use this for recurring nutrition subscriptions clients can buy or be assigned to.",
    },
    templates: {
      eyebrow: "NEW TEMPLATE",
      title: "New reusable template",
      defaultTitle: "New meal framework",
      defaultPrice: "$29",
      tag: "DRAFT TEMPLATE",
      color: "rgba(106,140,255,0.22)",
      helper: "Use this for reusable meal banks, grocery frameworks, or macro templates.",
    },
    oneTime: {
      eyebrow: "NEW ONE-TIME ASSET",
      title: "New guide or audit",
      defaultTitle: "New nutrition guide",
      defaultPrice: "$21",
      tag: "DRAFT GUIDE",
      color: "rgba(244,151,78,0.22)",
      helper: "Use this for one-time purchases that are not subscriptions.",
    },
    playlists: {
      eyebrow: "NEW PLAYLIST",
      title: "New prep playlist",
      defaultTitle: "New meal prep playlist",
      defaultPrice: "$0",
      tag: "PLAYLIST",
      color: "rgba(30,192,168,0.28)",
      helper: "Use this for Spotify or Apple Music playlists attached to plans or templates.",
    },
  }[tab];
  const [title, setTitle] = React.useState(config.defaultTitle);
  const [price, setPrice] = React.useState(config.defaultPrice);
  const [target, setTarget] = React.useState(tab === "playlists" ? "Protein-led cut (10w)" : "General clients");
  const [details, setDetails] = React.useState("");

  return (
    <div id="nutrition-asset-composer">
    <Card style={{ borderColor: "rgba(30,192,168,0.32)", marginBottom: 20 }}>
      <SectionTitle right={config.eyebrow}>{config.title}</SectionTitle>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 140px 1fr", gap: 12, marginBottom: 12 }}>
        <label>
          <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: "0.12em", color: "rgba(242,237,228,0.55)", marginBottom: 6 }}>TITLE</div>
          <input value={title} onChange={(e) => setTitle(e.target.value)} style={{ width: "100%", background: "rgba(242,237,228,0.04)", color: INK, border: "1px solid rgba(242,237,228,0.1)", borderRadius: 8, padding: "10px 12px", fontSize: 14, outline: "none" }} />
        </label>
        <label>
          <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: "0.12em", color: "rgba(242,237,228,0.55)", marginBottom: 6 }}>PRICE</div>
          <input value={price} onChange={(e) => setPrice(e.target.value)} style={{ width: "100%", background: "rgba(242,237,228,0.04)", color: INK, border: "1px solid rgba(242,237,228,0.1)", borderRadius: 8, padding: "10px 12px", fontSize: 14, outline: "none" }} />
        </label>
        <label>
          <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: "0.12em", color: "rgba(242,237,228,0.55)", marginBottom: 6 }}>{tab === "playlists" ? "ATTACH TO" : "AUDIENCE"}</div>
          <input value={target} onChange={(e) => setTarget(e.target.value)} style={{ width: "100%", background: "rgba(242,237,228,0.04)", color: INK, border: "1px solid rgba(242,237,228,0.1)", borderRadius: 8, padding: "10px 12px", fontSize: 14, outline: "none" }} />
        </label>
      </div>
      <textarea value={details} onChange={(e) => setDetails(e.target.value)} placeholder={config.helper} rows={3} style={{ width: "100%", resize: "vertical", background: "rgba(242,237,228,0.04)", color: INK, border: "1px solid rgba(242,237,228,0.1)", borderRadius: 8, padding: "10px 12px", fontSize: 14, lineHeight: 1.45, outline: "none" }} />
      <div style={{ display: "flex", justifyContent: "space-between", gap: 12, alignItems: "center", marginTop: 12 }}>
        <div style={{ fontSize: 12, color: "rgba(242,237,228,0.58)" }}>{config.helper}</div>
        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={onClose} style={{ background: "transparent", color: INK, border: "1px solid rgba(242,237,228,0.18)", padding: "10px 14px", borderRadius: 8, fontFamily: sans, fontSize: 13, cursor: "pointer" }}>Cancel</button>
          <button onClick={() => onCreate({ t: title || config.defaultTitle, active: 0, sold: 0, price: price || config.defaultPrice, tag: config.tag, color: config.color, target, details })} style={{ background: TEAL, color: PAPER, border: 0, padding: "10px 16px", borderRadius: 8, fontFamily: sans, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>Save draft</button>
        </div>
      </div>
    </Card>
    </div>
  );
}

function NutritionistPlansPage() {
  const [tab, setTab] = React.useState("plans");
  const [creatorOpen, setCreatorOpen] = React.useState(false);
  const [activity, setActivity] = React.useState("");
  const [plans, setPlans] = React.useState([
    { t: "Performance fuel (12w)", active: 14, sold: 38, price: "$180/mo", tag: "SIGNATURE", color: "rgba(30,192,168,0.18)" },
    { t: "Protein-led cut (10w)", active: 7, sold: 22, price: "$160/mo", tag: "FAT LOSS", color: "rgba(184,91,72,0.22)" },
    { t: "Plant-forward performance", active: 3, sold: 14, price: "$160/mo", tag: "PLANT", color: "rgba(30,192,168,0.24)" },
    { t: "Race-day fueling (8w)", active: 2, sold: 11, price: "$140/mo", tag: "ENDURANCE", color: "rgba(106,140,255,0.22)" },
    { t: "Mass phase (12w)", active: 2, sold: 9, price: "$180/mo", tag: "MASS", color: "rgba(244,151,78,0.22)" },
  ]);
  const [templates, setTemplates] = React.useState([
    { t: "High-protein breakfast bank", active: 12, sold: 71, price: "$29", tag: "TEMPLATE", color: "rgba(30,192,168,0.22)" },
    { t: "Grocery swap library", active: 8, sold: 46, price: "$19", tag: "TEMPLATE", color: "rgba(244,151,78,0.22)" },
    { t: "Low-FODMAP week", active: 5, sold: 33, price: "$35", tag: "TEMPLATE", color: "rgba(106,140,255,0.22)" },
  ]);
  const [oneTime, setOneTime] = React.useState([
    { t: "Travel nutrition guide", active: 6, sold: 57, price: "$21", tag: "GUIDE", color: "rgba(30,192,168,0.22)" },
    { t: "Race morning kit", active: 4, sold: 28, price: "$18", tag: "ONE-TIME", color: "rgba(184,91,72,0.22)" },
    { t: "Meal prep audit", active: 3, sold: 19, price: "$45", tag: "AUDIT", color: "rgba(244,151,78,0.22)" },
  ]);
  const [playlists, setPlaylists] = React.useState([]);
  const createAsset = (asset) => {
    if (tab === "plans") setPlans((current) => [asset, ...current]);
    if (tab === "templates") setTemplates((current) => [asset, ...current]);
    if (tab === "oneTime") setOneTime((current) => [asset, ...current]);
    if (tab === "playlists") setPlaylists((current) => [{ name: asset.t, sub: `Draft - ${asset.target || "Unassigned"}`, meta: "Ready to attach" }, ...current]);
    if (tab === "playlists") setActivity(`${asset.t} saved as a playlist draft. Attach it in Playlist studio.`);
    if (tab !== "playlists") setActivity(`${asset.t} saved as a draft in ${tab === "plans" ? "Meal plans" : tab === "templates" ? "Templates" : "One-time"}.`);
    setCreatorOpen(false);
  };
  const openCreator = () => {
    setCreatorOpen(true);
    setActivity("");
    window.setTimeout(() => document.getElementById("nutrition-asset-composer")?.scrollIntoView({ behavior: "smooth", block: "start" }), 0);
  };
  return (
    <DashPage
      navItems={nutriNavItems("plans")}
      payoutCard={nutriPayoutCard}
      eyebrow="MEAL PLANS - TEMPLATES - ONE-TIME - PLAYLISTS"
      title="Plans"
      subtitle="Meal plans are subscriptions. Templates and guides are one-time purchases. Playlists attach to any nutrition workflow."
      actions={<>
        <button style={{ background: "transparent", color: INK, border: "1px solid rgba(242,237,228,0.25)", padding: "10px 20px", borderRadius: 999, fontFamily: sans, fontSize: 13, cursor: "pointer" }}>Drafts (1)</button>
        <button onClick={openCreator} style={{ background: INK, color: PAPER, border: 0, padding: "10px 22px", borderRadius: 999, fontFamily: sans, fontSize: 13, fontWeight: 500, cursor: "pointer" }}>+ New asset</button>
      </>}
    >
      <PlanTabs value={tab} onChange={(nextTab) => { setTab(nextTab); setCreatorOpen(false); setActivity(""); }} />
      {creatorOpen && <NewAssetComposer tab={tab} onCreate={createAsset} onClose={() => setCreatorOpen(false)} />}
      {activity && <div style={{ marginBottom: 16, padding: "11px 14px", borderRadius: 10, border: "1px solid rgba(30,192,168,0.24)", background: "rgba(30,192,168,0.08)", color: TEAL_BRIGHT, fontFamily: "'JetBrains Mono', monospace", fontSize: 11, letterSpacing: "0.08em" }}>{activity}</div>}
      {tab === "plans" && <><AIGeneratorCard kind="meal_plan" role="nutritionist" /><ProductGrid items={plans} title="Meal-plan performance" meta="RECURRING SUBSCRIPTIONS" /></>}
      {tab === "templates" && <ProductGrid items={templates} title="Template sales" meta="REUSABLE MEAL FRAMEWORKS" />}
      {tab === "oneTime" && <ProductGrid items={oneTime} title="One-time purchases" meta="NOT MEAL PLANS - NOT SUBSCRIPTIONS" />}
      {tab === "playlists" && <PlaylistStudio drafts={playlists} />}
    </DashPage>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<NutritionistPlansPage />);
</script>
<script src="globalChatButton.js" defer></script>
</body>
</html>
