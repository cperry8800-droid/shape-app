function MacroRing({ value, target, label, color }) {
  const pct = Math.min(value / target, 1);
  const r = 34, c = 2 * Math.PI * r;
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
      <svg width={88} height={88} viewBox="0 0 88 88">
        <circle cx="44" cy="44" r={r} fill="none" stroke="rgba(242,237,228,0.08)" strokeWidth="6" />
        <circle cx="44" cy="44" r={r} fill="none" stroke={color} strokeWidth="6" strokeLinecap="round"
          strokeDasharray={`${pct * c} ${c}`} transform="rotate(-90 44 44)" />
      </svg>
      <div style={{ fontFamily: serif, fontSize: 20, letterSpacing: "-0.01em", marginTop: -58, lineHeight: 1 }}>{value}</div>
      <div style={{ fontSize: 10, fontFamily: "'JetBrains Mono', monospace", color: "rgba(242,237,228,0.5)", marginTop: 34, letterSpacing: "0.08em" }}>{label}</div>
      <div style={{ fontSize: 11, color: "rgba(242,237,228,0.5)", marginTop: 2 }}>of {target}g</div>
    </div>
  );
}

function countListItems(list) {
  return list.categories.reduce((total, cat) => total + cat.items.length, 0);
}

function itemKey(list, catName, itemName) {
  return `${list.id}:${catName}:${itemName}`;
}

function NutriTabs({ active, onChange }) {
  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10, marginBottom: 22 }}>
      {[["day", "Day"], ["grocery", "Grocery"], ["recipes", "Recipes"]].map(([id, label]) => {
        const selected = active === id;
        return (
          <button key={id} type="button" onClick={() => onChange(id)}
            style={{
              border: `1px solid ${selected ? "rgba(30,192,168,0.45)" : "rgba(242,237,228,0.16)"}`,
              background: selected ? "rgba(30,192,168,0.16)" : "rgba(242,237,228,0.04)",
              color: selected ? TEAL_BRIGHT : "rgba(242,237,228,0.78)",
              borderRadius: 999,
              padding: "12px 14px",
              fontFamily: "'JetBrains Mono', monospace",
              fontSize: 11,
              letterSpacing: "0.14em",
              textTransform: "uppercase",
              cursor: "pointer",
            }}
          >
            {label}
          </button>
        );
      })}
    </div>
  );
}

          <div style={{ fontSize: 14, lineHeight: 1.55, color: "rgba(242,237,228,0.85)" }}>Post-run fueling: 30g whey + 60g carbs within 45 min. I've pre-built 3 shakes in your library — tap Log meal → Templates.</div>
          <div style={{ marginTop: 16, display: "flex", gap: 10 }}>
            <button
              type="button"
              onClick={() => window.__openChat && window.__openChat("Rae", "circle")}
              style={{ background: "transparent", color: PAPER, border: "1px solid rgba(242,237,228,0.3)", padding: "7px 14px", borderRadius: 999, fontFamily: sans, fontSize: 12, cursor: "pointer" }}
            >
              Reply
            </button>
            <a
              href="ClientLibrary.html?tag=NUTRITION"
              style={{ background: PAPER, color: INK, border: 0, padding: "7px 14px", borderRadius: 999, fontFamily: sans, fontSize: 12, fontWeight: 500, cursor: "pointer", display: "inline-flex", alignItems: "center", textDecoration: "none" }}
            >
              Open templates
            </a>
          </div>
        </Card>
      </div>
      </>
      )}
      {view === "grocery" && (
        <GroceryView
          list={activeList}
          checked={checked}
          onToggle={(key) => setChecked((prev) => ({ ...prev, [key]: !prev[key] }))}
          onReset={() => setChecked({})}
          onLoad={loadList}
        />
      )}
      {view === "recipes" && <RecipesView onAdd={addRecipeToGrocery} />}
    </DashPage>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(
  <React.Fragment>
    <ClientNutriPage />
    <ChatWidget tabs={clientChatTabs} />
  </React.Fragment>
);
</script>
<script src="globalChatButton.js" defer></script>
</body>
</html>
