<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Get the Shape App — iOS &amp; Android</title>
<meta name="description" content="A guided, step-by-step walkthrough of the Shape app — train, eat, recover, and stay accountable with a real human coach." />
<link rel="canonical" href="https://theshapecommunity.com/newdesign/GetApp.html">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper: #efe5cd;
    --paper-2: #e6dabe;
    --paper-3: #f7f1e3;
    --ink: #0a0d0c;
    --ink-2: rgba(10,13,12,0.62);
    --ink-3: rgba(10,13,12,0.4);
    --teal: #0aa090;
    --teal-bright: #14c0a8;
    --orange: #d2693f;
    --hairline: rgba(10,13,12,0.1);
    --hairline-2: rgba(10,13,12,0.06);
    --serif: 'Fraunces', serif;
    --sans: 'Space Grotesk', sans-serif;
    --mono: 'JetBrains Mono', monospace;
    --screen: #f4eedf;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink); font-family: var(--sans); -webkit-font-smoothing: antialiased; }
  html { -webkit-text-size-adjust: 100%; }
  body { overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }
  img { display: block; max-width: 100%; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: 0; background: none; }
  ::selection { background: var(--teal); color: var(--paper); }

  .wrap { max-width: 1100px; margin: 0 auto; padding: 0 24px; width: 100%; }

  .nav { position: sticky; top: 0; z-index: 50; background: rgba(239,229,205,0.85); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border-bottom: 1px solid var(--hairline-2); }
  .nav-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; gap: 16px; }
  .brand img { height: 44px; width: auto; display: block; }
  .nav-back { font-size: 13px; color: var(--ink-2); }
  .nav-back:hover { color: var(--ink); }

  .tour { display: flex; flex-direction: column; }
  .tour-head { text-align: center; padding: 40px 0 8px; }
  .eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: 0.2em; color: var(--teal); text-transform: uppercase; }
  .tour-head h1 { font-family: var(--serif); font-weight: 500; font-size: clamp(30px, 6vw, 50px); letter-spacing: -0.03em; line-height: 1; margin: 12px 0 0; }

  .stage {
    display: grid; grid-template-columns: 1fr 360px; gap: 64px;
    align-items: center; padding: 24px 0 56px; max-width: 1040px;
    margin: 0 auto; width: 100%; min-height: 70vh;
  }
  .copy { min-width: 0; }
  .step-no { font-family: var(--mono); font-size: 12px; letter-spacing: 0.16em; color: var(--ink-3); text-transform: uppercase; display: flex; align-items: baseline; gap: 12px; }
  .step-no b { color: var(--teal); }
  .copy h2 { font-family: var(--serif); font-weight: 500; font-size: clamp(28px, 4.4vw, 42px); letter-spacing: -0.025em; line-height: 1.05; margin: 16px 0 14px; }
  .copy p { font-size: 16px; line-height: 1.62; color: var(--ink-2); margin: 0; max-width: 460px; }

  .controls { display: flex; align-items: center; gap: 14px; margin-top: 34px; }
  .btn {
    display: inline-flex; align-items: center; gap: 9px;
    padding: 13px 22px; border-radius: 10px; font: 600 14px/1 var(--sans);
    transition: transform .12s ease, background .15s ease, opacity .15s ease;
  }
  .btn.primary { background: var(--ink); color: var(--paper); }
  .btn.primary:hover { transform: translateY(-1px); }
  .btn.ghost { border: 1px solid rgba(10,13,12,0.2); color: var(--ink); }
  .btn.ghost:hover { background: rgba(10,13,12,0.05); }
  .btn[disabled] { opacity: 0.32; pointer-events: none; }

  .dots { display: flex; gap: 8px; margin-top: 26px; flex-wrap: wrap; }
  .dot { width: 9px; height: 9px; border-radius: 999px; background: rgba(10,13,12,0.18); border: 0; padding: 0; transition: all .2s ease; }
  .dot:hover { background: rgba(10,13,12,0.34); }
  .dot.on { background: var(--teal); width: 26px; }

  .phone {
    width: 320px; max-width: 84vw; aspect-ratio: 393 / 852; margin: 0 auto;
    position: relative; box-sizing: border-box; border-radius: 56px; padding: 9px;
    background: var(--screen);
    border: 1px solid rgba(10,13,12,0.14);
    box-shadow:
      8px 16px 30px rgba(40,30,15,0.16),
      0 22px 44px rgba(40,30,15,0.14),
      inset 0 1px 1px rgba(255,255,255,0.5);
  }
  .phone::after {
    content: ''; position: absolute; inset: 3px; border-radius: 53px;
    pointer-events: none; box-shadow: inset 0 0 0 1px rgba(120,100,60,0.08);
  }
  .island {
    position: absolute; top: 16px; left: 50%; width: 92px; height: 27px;
    transform: translateX(-50%); border-radius: 999px; background: #050505;
    z-index: 3; pointer-events: none;
  }
  .screen-crop {
    position: relative; width: 100%; height: 100%; overflow: hidden;
    border-radius: 48px; background: var(--screen);
    box-shadow: inset 0 0 0 1px rgba(120,100,60,0.08);
  }
  .screen-crop img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: contain; object-position: center center;
    opacity: 0; transition: opacity .45s ease;
  }
  .screen-crop img.on { opacity: 1; }
  .phone.dark { background: #14110d; border-color: rgba(255,255,255,0.16); }
  .phone.dark .screen-crop { background: #14110d; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08); }
  .phone.dark::after { box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06); }

  .phone-col { display: flex; justify-content: center; }

  .progress-rail { height: 2px; background: var(--hairline-2); position: relative; }
  .progress-fill { position: absolute; left: 0; top: 0; bottom: 0; background: var(--teal); transition: width .35s ease; }

  /* Waitlist CTA */
  .cta { text-align: center; padding: 64px 0 48px; border-top: 1px solid var(--hairline-2); background: var(--paper-3); }
  .cta h2 { font-family: var(--serif); font-weight: 500; font-size: clamp(30px, 5.4vw, 44px); letter-spacing: -0.025em; line-height: 1.02; margin: 10px 0 14px; }
  .cta .eyebrow { color: var(--orange); }
  .cta p { font-size: 15px; color: var(--ink-2); max-width: 460px; margin: 0 auto 24px; line-height: 1.55; }
  .store-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .store-btn { display: inline-flex; align-items: center; gap: 10px; padding: 12px 20px; border-radius: 12px; background: var(--ink); color: var(--paper); cursor: pointer; transition: transform .12s ease, opacity .15s ease; }
  .store-btn:hover { transform: translateY(-1px); }
  .store-btn:focus-visible { outline: 2px solid var(--teal); outline-offset: 2px; }
  .store-btn.is-outline { background: transparent; color: var(--ink); border: 1px solid rgba(10,13,12,0.22); }
  .store-btn small { display: block; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.7; }
  .store-btn b { display: block; font-size: 15px; font-weight: 600; }
  .glyph { width: 20px; height: 20px; flex: 0 0 auto; display: block; color: inherit; }
  .glyph path { fill: currentColor; }
  .notify-widget { margin-top: 22px; min-height: 44px; }
  .notify-toggle { font-family: var(--mono); font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-2); border-bottom: 1px solid var(--hairline); padding: 6px 2px; }
  .notify-toggle:hover { color: var(--ink); }
  .notify-toggle.is-hidden { display: none; }
  .notify-form { display: none; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .notify-form.is-open { display: flex; }
  .notify-form input { font-family: var(--sans); font-size: 14px; padding: 12px 14px; border-radius: 10px; border: 1px solid rgba(10,13,12,0.2); background: var(--paper); color: var(--ink); min-width: 240px; }
  .notify-form input:focus { outline: 2px solid var(--teal); outline-offset: 1px; }
  .notify-form button { font: 600 14px/1 var(--sans); padding: 12px 20px; border-radius: 10px; background: var(--ink); color: var(--paper); }
  .notify-msg { font-size: 13px; margin: 12px 0 0; min-height: 18px; }
  .notify-msg.ok { color: var(--teal); }
  .notify-msg.err { color: var(--orange); }

  footer { border-top: 1px solid var(--hairline-2); padding: 30px 0 26px; }
  .foot-cta { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .foot-logo { height: 30px; width: auto; }
  .foot-tagline { font-family: var(--mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-3); }
  .foot-row { display: flex; align-items: center; justify-content: space-between; gap: 14px; margin-top: 18px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; color: var(--ink-3); text-transform: uppercase; flex-wrap: wrap; }
  .foot-links { display: flex; gap: 18px; }
  .foot-links a:hover { color: var(--ink); }

  @media (max-width: 860px) {
    .stage { grid-template-columns: 1fr; gap: 32px; padding: 16px 0 44px; min-height: 0; }
    .phone-col { order: -1; }
    .phone { width: 264px; padding: 7px; border-radius: 46px; }
    .screen-crop { border-radius: 40px; }
    .copy { text-align: center; }
    .copy p { margin: 0 auto; }
    .step-no, .controls, .dots { justify-content: center; }
    .tour-head { padding: 26px 0 4px; }
    .foot-row { justify-content: center; text-align: center; }
  }
  @media (prefers-reduced-motion: reduce) {
    .screen-crop img { transition: none; }
    .progress-fill { transition: none; }
  }
</style>
</head>
<body>

<div class="progress-rail"><div class="progress-fill" id="progressFill"></div></div>

<header class="nav">
  <div class="wrap nav-row">
    <a href="/newdesign/index.html" class="brand" aria-label="Shape home"><img src="/shape-logo-black.png" alt="Shape" /></a>
    <a href="#notify" class="nav-back">Notify me →</a>
  </div>
</header>

<main class="tour">
  <div class="tour-head">
    <div class="eyebrow">The walkthrough</div>
    <h1 id="tourTitle">See how Shape works.</h1>
  </div>

  <div class="wrap">
    <div class="stage">
      <div class="copy">
        <div class="step-no"><b id="stepNum">01</b><span id="stepTotal">/ 08</span><span id="stepKind"></span></div>
        <h2 id="stepTitle"></h2>
        <p id="stepBody"></p>
        <div class="controls">
          <button class="btn ghost" id="prevBtn">← Back</button>
          <button class="btn primary" id="nextBtn">Next →</button>
        </div>
        <div class="dots" id="dots" role="tablist" aria-label="Walkthrough steps"></div>
      </div>

      <div class="phone-col">
        <div class="phone" id="phone">
          <div class="island"></div>
          <div class="screen-crop" id="screenCrop"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<section class="cta" id="notify">
  <div class="wrap">
    <div class="eyebrow">Coming soon</div>
    <h2>Be the first to download.</h2>
    <p>We'll send the App Store link the day it ships. Nothing else, ever.</p>
    <div class="store-row">
      <span class="store-btn" role="button" tabindex="0" aria-label="Notify me on App Store"><svg class="glyph" viewBox="0 0 24 24" aria-hidden="true"><path d="M16.365 1.43c0 1.14-.42 2.2-1.13 3.02-.82.97-2.16 1.72-3.27 1.63-.14-1.1.42-2.27 1.1-3.04.78-.89 2.16-1.55 3.3-1.61zM20.5 17.05c-.55 1.27-.82 1.84-1.53 2.96-.99 1.57-2.39 3.53-4.12 3.54-1.54.02-1.94-1.01-4.03-1-2.09.01-2.53 1.02-4.07 1-1.73-.02-3.05-1.78-4.04-3.35C.27 17.5-.18 13.5 1.36 11.04c1.04-1.66 2.69-2.64 4.24-2.64 1.58 0 2.57 1.06 3.87 1.06 1.26 0 2.03-1.06 3.86-1.06 1.38 0 2.85.75 3.9 2.05-3.43 1.88-2.87 6.77.27 8.6z"/></svg><span><small>Notify me on</small><b>App Store</b></span></span>
      <span class="store-btn is-outline" role="button" tabindex="0" aria-label="Notify me on Google Play"><svg class="glyph" viewBox="0 0 24 24" aria-hidden="true"><path d="M3.6 2.1a1 1 0 0 0-.6.92v17.96a1 1 0 0 0 .6.92l10.13-9.9zm11.27 7.07 2.9-2.83-8.9-5.06a1 1 0 0 0-.5-.14zm0 5.66 -6.5 6.3a1 1 0 0 0 .5-.14l8.9-5.06zm1.4-1.37 3.5-1.99a1 1 0 0 0 0-1.74l-3.5-1.99-3.18 3.1z"/></svg><span><small>Notify me on</small><b>Google Play</b></span></span>
    </div>
    <div class="notify-widget">
      <button type="button" class="notify-toggle" aria-expanded="false">Notify me</button>
      <form class="notify-form" novalidate>
        <input type="email" name="email" placeholder="you@email.com" autocomplete="email" required aria-label="Email address" />
        <button type="submit">Submit</button>
      </form>
      <p class="notify-msg" role="status" aria-live="polite"></p>
    </div>
  </div>
</section>

<footer>
  <div class="wrap foot-cta">
    <img src="/shape-logo-black.png" alt="Shape" class="foot-logo" />
    <div class="foot-tagline">Join the community</div>
  </div>
  <div class="wrap foot-row">
    <div>© 2026 Shape — Find your coach.</div>
    <div class="foot-links">
      <a href="/newdesign/index.html">Home</a>
      <a href="/privacy">Privacy</a>
      <a href="/terms">Terms</a>
      <a href="/contact">Contact</a>
    </div>
  </div>
</footer>

<script>
(function () {
  var STEPS = [
    { kind: "HOME",     title: "Today, at a glance.",         body: "The Shape Daily — calendar, calorie ledger, what's left to log, who's on the air. Skim it in five seconds, dive in if you want.", img: "/newdesign/getapp-home-v3.png", dark: true },
    { kind: "TRAIN",    title: "Know what's coming.",          body: "Every move, set, and cue from your trainer — before you walk into the gym. Tap a move for video, note warmups, mark a substitute.", img: "/newdesign/getapp-train-v2.png", dark: false },
    { kind: "EAT",      title: "Macros, tallied live.",        body: "Daily meal plans from your nutritionist. The day's deficit (or surplus) ticks as you log. Swaps for travel days built in.", img: "/newdesign/getapp-nutri-v2.png", dark: false },
    { kind: "GROCERY",  title: "List that builds itself.",     body: "Organized by aisle with a live running cost. Coach swaps land inline. One tap to send the whole list to Instacart.", img: "/newdesign/grocery%20list%20(white).png", dark: false },
    { kind: "HABITS",   title: "Small things, tracked.",       body: "Tap to log. Earn Shape Score for every check. Pick friends to be notified when you miss — accountability without the guilt trip.", img: "/newdesign/habits.png", dark: true },
    { kind: "SCORE",    title: "One number that matters.",     body: "A five-tier ladder rewarding consistency across training, nutrition, and recovery. It only moves when you show up.", img: "/newdesign/getapp-score-v2.png", dark: true },
    { kind: "RADIO",    title: "Music built for movement.",    body: "Live mixes curated by your coach. Each track's BPM syncs with your wearable — when the two lock in, your pace becomes the song.", img: "/newdesign/getapp-radio-v2.png", dark: true },
    { kind: "CHAT",     title: "A real human, in the loop.",   body: "Not a chatbot. Your vetted coach reads your logs, asks how you're feeling, and adjusts each week. The app keeps that loop tight — daily.", img: "/newdesign/getapp-chat-v2.png", dark: false }
  ];

  var i = 0;
  var screenCrop = document.getElementById("screenCrop");
  var phone = document.getElementById("phone");
  var dotsWrap = document.getElementById("dots");
  var prevBtn = document.getElementById("prevBtn");
  var nextBtn = document.getElementById("nextBtn");
  var stepNum = document.getElementById("stepNum");
  var stepTotal = document.getElementById("stepTotal");
  var stepKind = document.getElementById("stepKind");
  var stepTitle = document.getElementById("stepTitle");
  var stepBody = document.getElementById("stepBody");
  var progressFill = document.getElementById("progressFill");
  var imgs = [];

  STEPS.forEach(function (s, idx) {
    var im = document.createElement("img");
    im.src = s.img;
    im.alt = s.kind + " screen";
    im.loading = idx === 0 ? "eager" : "lazy";
    screenCrop.appendChild(im);
    imgs.push(im);

    var d = document.createElement("button");
    d.className = "dot";
    d.setAttribute("role", "tab");
    d.setAttribute("aria-label", "Step " + (idx + 1) + ": " + s.kind);
    d.addEventListener("click", function () { go(idx); });
    dotsWrap.appendChild(d);
  });
  var dots = dotsWrap.querySelectorAll(".dot");
  stepTotal.textContent = "/ " + String(STEPS.length).padStart(2, "0");

  function render() {
    var s = STEPS[i];
    imgs.forEach(function (im, idx) { im.classList.toggle("on", idx === i); });
    phone.classList.toggle("dark", !!s.dark);
    stepNum.textContent = String(i + 1).padStart(2, "0");
    stepKind.textContent = "· " + s.kind;
    stepTitle.textContent = s.title;
    stepBody.textContent = s.body;
    dots.forEach(function (d, idx) {
      d.classList.toggle("on", idx === i);
      d.setAttribute("aria-selected", idx === i ? "true" : "false");
    });
    prevBtn.disabled = i === 0;
    nextBtn.textContent = i === STEPS.length - 1 ? "Get the app →" : "Next →";
    progressFill.style.width = ((i + 1) / STEPS.length * 100) + "%";
  }

  function go(n) {
    if (n < 0 || n >= STEPS.length) return;
    i = n;
    render();
  }

  prevBtn.addEventListener("click", function () { go(i - 1); });
  nextBtn.addEventListener("click", function () {
    if (i === STEPS.length - 1) {
      var notify = document.getElementById("notify");
      if (notify) notify.scrollIntoView({ behavior: "smooth", block: "start" });
      return;
    }
    go(i + 1);
  });
  document.addEventListener("keydown", function (e) {
    if (e.key === "ArrowRight") { if (i < STEPS.length - 1) go(i + 1); }
    else if (e.key === "ArrowLeft") { go(i - 1); }
  });

  render();
})();
</script>

<script>
  (function () {
    var EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    document.querySelectorAll('.notify-widget').forEach(function (widget) {
      var form = widget.querySelector('.notify-form');
      var input = widget.querySelector('input[name="email"]');
      var btn = widget.querySelector('button[type="submit"]');
      var msg = widget.querySelector('.notify-msg');
      var toggle = widget.querySelector('.notify-toggle');
      if (!form || !input || !btn || !msg || !toggle) return;

      function openForm() {
        form.classList.add('is-open');
        toggle.classList.add('is-hidden');
        toggle.setAttribute('aria-expanded', 'true');
        setTimeout(function () { input.focus(); }, 30);
      }
      toggle.addEventListener('click', openForm);

      var section = widget.closest('#notify') || document;
      section.querySelectorAll('.store-btn').forEach(function (b) {
        b.addEventListener('click', openForm);
        b.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openForm(); }
        });
      });

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        var email = (input.value || '').trim();
        msg.className = 'notify-msg';
        if (!EMAIL_RE.test(email)) {
          msg.classList.add('err');
          msg.textContent = 'Please enter a valid email.';
          return;
        }

        var originalLabel = btn.textContent;
        btn.disabled = true;
        btn.textContent = 'Saving...';

        try {
          var res = await fetch('/api/app-waitlist', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email, source: 'GetApp.html' })
          });
          if (!res.ok) {
            var body = await res.json().catch(function () { return {}; });
            msg.classList.add('err');
            msg.textContent = body.error || 'Could not save your email. Please try again.';
          } else {
            msg.classList.add('ok');
            msg.textContent = "You're on the list. We'll email you the day it is live";
            input.value = '';
          }
        } catch (err) {
          msg.classList.add('err');
          msg.textContent = 'Network error. Please try again.';
        } finally {
          btn.disabled = false;
          btn.textContent = originalLabel;
        }
      });
    });
  })();
</script>

<script src="globalChatButton.js" defer></script>
</body>
