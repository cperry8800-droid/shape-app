<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Score · Shape</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>html,body{margin:0;padding:0;background:#1a1612}*{box-sizing:border-box}a{text-decoration:none;color:inherit}</style>
</head>
<body><div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script type="text/babel" src="pageShell.jsx"></script>
<script type="text/babel" src="trainerDashboard.jsx"></script>
<script type="text/babel" src="coachNav.jsx"></script>
<script type="text/babel">
function TrainerScorePage() {
  const tiers = [["Raw","0–500","Just getting started",false],["Tempo","500–1,500","Consistent coach",false],["Peak","1,500–3,000","Top performer",true],["Legend","3,000+","Top 1% of coaches",false]];
  const breakdown = [
    ["Active clients",        620, "34 clients · +11 this Q"],
    ["Client adherence",      420, "92% 30d avg"],
    ["Session completion",    380, "96% 30d avg"],
    ["Client PRs attributed", 280, "42 in last 90d"],
    ["Programs published",    140, "5 live · 1 trending"],
    ["Reviews",               220, "4.97 · 1,284 reviews"],
    ["Radio hosted",           80, "3 rooms last month"],
    ["Community endorsements",120, "38 coach co-signs"],
  ];
  return (
    <DashPage
      navItems={trainerNavItems("score")}
      payoutCard={trainerPayoutCard}
      eyebrow="COACH SCORE · PEAK"
      title="2,260"
      subtitle="Top 4% of trainers on Shape. Scores drive marketplace ranking, verified badge, and payout tier."
      actions={<>
        <button style={{ background: "transparent", color: INK, border: "1px solid rgba(242,237,228,0.25)", padding: "10px 20px", borderRadius: 999, fontFamily: sans, fontSize: 13, cursor: "pointer" }}>How it works</button>
        <button style={{ background: INK, color: PAPER, border: 0, padding: "10px 22px", borderRadius: 999, fontFamily: sans, fontSize: 13, fontWeight: 500, cursor: "pointer" }}>Leaderboard</button>
      </>}
    >
      <Card style={{ marginBottom: 20 }}>
        <SectionTitle right="PEAK · TOP 4%">Tiers</SectionTitle>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", marginTop: 8 }}>
          {tiers.map(([t,r,d,cur],i)=>(
            <div key={t} style={{ padding: "18px 16px", borderLeft: i === 0 ? "none" : "1px solid rgba(242,237,228,0.08)", background: cur ? "rgba(30,192,168,0.08)" : "transparent" }}>
              <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: "0.14em", color: cur ? TEAL_BRIGHT : "rgba(242,237,228,0.45)", marginBottom: 6 }}>{r}</div>
              <div style={{ fontFamily: serif, fontSize: 26, letterSpacing: "-0.015em", color: cur ? INK : "rgba(242,237,228,0.6)" }}>{t}</div>
              <div style={{ fontSize: 11.5, color: "rgba(242,237,228,0.55)", marginTop: 4 }}>{d}</div>
            </div>
          ))}
        </div>
      </Card>
      <div style={{ display: "grid", gridTemplateColumns: "1.5fr 1fr", gap: 20 }}>
        <Card>
          <SectionTitle right="TOTAL 2,260">Score breakdown</SectionTitle>
          {breakdown.map(([l,v,sub],i)=>{
            const w = (v / Math.max(...breakdown.map(b=>b[1]))) * 100;
            return (
              <div key={i} style={{ padding: "14px 0", borderTop: i === 0 ? "none" : "1px solid rgba(242,237,228,0.06)" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
                  <div style={{ fontSize: 14, fontWeight: 500 }}>{l}</div>
                  <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 13, color: TEAL_BRIGHT }}>+{v}</div>
                </div>
                <div style={{ fontSize: 11.5, color: "rgba(242,237,228,0.5)", marginBottom: 8 }}>{sub}</div>
                <div style={{ height: 3, background: "rgba(242,237,228,0.06)", borderRadius: 999, overflow: "hidden" }}>
                  <div style={{ height: "100%", width: `${w}%`, background: TEAL }} />
                </div>
              </div>
            );
          })}
        </Card>
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <Card>
            <SectionTitle>What Peak unlocks</SectionTitle>
            <div style={{ display: "grid", gap: 12, fontSize: 13, color: "rgba(242,237,228,0.75)" }}>
              <div>• Verified badge on marketplace</div>
              <div>• Top-3 rank in Strength category</div>
              <div>• Higher payout tier</div>
              <div>• Host Shape Radio rooms</div>
              <div>• Early access to new features</div>
            </div>
          </Card>
          <Card style={{ background: "rgba(30,192,168,0.06)", border: "1px solid rgba(30,192,168,0.25)" }}>
            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: "0.14em", color: TEAL_BRIGHT, marginBottom: 10 }}>PATH TO LEGEND</div>
            <div style={{ fontSize: 14, lineHeight: 1.55, color: "rgba(242,237,228,0.85)" }}>740 more points. Top levers: add 8 clients (+160), hit 95% adherence (+80), publish 2 programs (+160).</div>
          </Card>
        </div>
      </div>
    </DashPage>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<TrainerScorePage />);
</script>
<script type="text/babel" data-presets="react" src="chatWidget.jsx"></script>
<script type="text/babel" data-presets="react" src="clientChatThreads.jsx"></script>
<script type="text/babel" data-presets="react" src="supportBubble.jsx"></script>
</body>
</html>
