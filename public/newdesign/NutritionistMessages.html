<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Messages · Shape</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>html,body{margin:0;padding:0;background:#1a1612}*{box-sizing:border-box}a{text-decoration:none;color:inherit}</style>
</head>
<body><div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script type="text/babel" src="pageShell.jsx"></script>
<script type="text/babel" src="trainerDashboard.jsx"></script>
<script type="text/babel" src="coachNav.jsx"></script>
<script type="text/babel">
function NutritionistMessagesPage() {
  const threads = [
    { who: "Priya Shah", last: "Shakes in templates — thanks!", time: "14m", unread: 0, active: true },
    { who: "Jonah Weiss", last: "Missed carbs on long run again", time: "38m", unread: 2 },
    { who: "Marcus Larson", last: "Re: protein target", time: "1h", unread: 1 },
    { who: "Elena Rivera", last: "Down 14 lb!!", time: "3h", unread: 1 },
    { who: "Ana Park", last: "Intake form submitted", time: "Yesterday", unread: 1 },
  ];
  const msgs = [
    { who: "Priya", t: "Quick q — post-run window: 30g whey + 60g carbs?", time: "1:28 PM", me: false },
    { who: "Rae", t: "Yes, within 45 min. I built 3 shake templates — tap Log meal → Templates.", time: "1:30 PM", me: true },
    { who: "Priya", t: "Shakes in templates — thanks!", time: "1:45 PM", me: false },
  ];
  return (
    <DashPage
      navItems={nutriNavItems("messages")}
      payoutCard={nutriPayoutCard}
      eyebrow="5 UNREAD · 9 ACTIVE THREADS"
      title="Messages"
      subtitle="All nutrition conversations. Replies link to the client's log so you can see what they ate when they asked."
      actions={<>
        <button style={{ background: "transparent", color: INK, border: "1px solid rgba(242,237,228,0.25)", padding: "10px 20px", borderRadius: 999, fontFamily: sans, fontSize: 13, cursor: "pointer" }}>Templates</button>
        <button style={{ background: INK, color: PAPER, border: 0, padding: "10px 22px", borderRadius: 999, fontFamily: sans, fontSize: 13, fontWeight: 500, cursor: "pointer" }}>Broadcast</button>
      </>}
    >
      <div style={{ display: "grid", gridTemplateColumns: "340px 1fr", gap: 20 }}>
        <Card style={{ padding: 0 }}>
          <div style={{ padding: "18px 18px 10px" }}><SectionTitle>Inbox</SectionTitle></div>
          {threads.map((t, i) => (
            <div key={i} style={{ padding: "14px 18px", borderTop: i === 0 ? "none" : "1px solid rgba(242,237,228,0.05)", background: t.active ? "rgba(30,192,168,0.08)" : "transparent", cursor: "pointer", borderLeft: t.active ? `2px solid ${TEAL}` : "2px solid transparent" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                <div style={{ fontSize: 13.5, fontWeight: 500 }}>{t.who}</div>
                <div style={{ fontSize: 10, color: "rgba(242,237,228,0.45)", fontFamily: "'JetBrains Mono', monospace" }}>{t.time}</div>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", gap: 8 }}>
                <div style={{ fontSize: 12, color: "rgba(242,237,228,0.55)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.last}</div>
                {t.unread > 0 && <span style={{ background: TEAL, color: PAPER, fontSize: 10, fontFamily: "'JetBrains Mono', monospace", padding: "2px 6px", borderRadius: 999, minWidth: 18, textAlign: "center" }}>{t.unread}</span>}
              </div>
            </div>
          ))}
        </Card>
        <Card style={{ padding: 0, display: "flex", flexDirection: "column", height: 600 }}>
          <div style={{ padding: "18px 24px", borderBottom: "1px solid rgba(242,237,228,0.08)" }}>
            <div style={{ fontSize: 15, fontWeight: 500 }}>Priya Shah</div>
            <div style={{ fontSize: 11.5, color: "rgba(242,237,228,0.55)", marginTop: 2 }}>Performance fuel · 89% adherence · 14d streak</div>
          </div>
          <div style={{ flex: 1, padding: 24, overflowY: "auto", display: "flex", flexDirection: "column", gap: 12 }}>
            {msgs.map((m, i) => (
              <div key={i} style={{ display: "flex", justifyContent: m.me ? "flex-end" : "flex-start" }}>
                <div style={{ maxWidth: "68%", background: m.me ? TEAL : "rgba(242,237,228,0.06)", color: m.me ? PAPER : INK, padding: "10px 14px", borderRadius: 14, fontSize: 13.5, lineHeight: 1.5 }}>
                  {m.t}
                  <div style={{ fontSize: 10, color: m.me ? "rgba(26,22,18,0.5)" : "rgba(242,237,228,0.4)", marginTop: 4, fontFamily: "'JetBrains Mono', monospace" }}>{m.time}</div>
                </div>
              </div>
            ))}
          </div>
          <div style={{ padding: 18, borderTop: "1px solid rgba(242,237,228,0.08)", display: "flex", gap: 10 }}>
            <input placeholder="Write to Priya…" style={{ flex: 1, background: "rgba(242,237,228,0.04)", border: "1px solid rgba(242,237,228,0.1)", padding: "10px 14px", borderRadius: 999, color: INK, fontSize: 13, outline: "none", fontFamily: sans }} />
            <button style={{ background: INK, color: PAPER, border: 0, padding: "10px 20px", borderRadius: 999, fontSize: 13, fontWeight: 500, cursor: "pointer" }}>Send</button>
          </div>
        </Card>
      </div>
    </DashPage>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<NutritionistMessagesPage />);
</script>
<script type="text/babel" data-presets="react" src="supportBubble.jsx"></script>
</body>
</html>
