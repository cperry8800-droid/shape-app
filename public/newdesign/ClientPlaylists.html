<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Client Playlists · Shape</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;background:#0d0b09;color:#f2ede4;font-family:'Space Grotesk',sans-serif}
  *{box-sizing:border-box}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="clientPlaylist.jsx"></script>

<script type="text/babel">
const { useState } = React;

// Sample workout + playlist data
const WORKOUT_TRAIN = {
  time: "9:00 AM · TODAY",
  title: "Upper Body Pull",
  sub: "45 min · 6 exercises · from Maya",
};
const PLAYLIST_TRAIN = {
  name: "Upper Pull — Peak",
  provider: "spotify",
  bpm: "95–130",
  tracks: 31,
  duration: "1h 48m",
  accent: "#6a8cff",
  cover: "linear-gradient(135deg, #2a3a6a 0%, #1a1612 70%)",
  note: "Builds across the session. Peaks at your top sets — don't pussyfoot that row.",
  author: "Maya",
  authorRole: "Trainer",
  currentTrack: ["Fred again..", "Delilah (pull me out of this)", "4:12"],
  sampleTracks: [
    ["Floating Points", "Last Bloom", "4:26"],
    ["Bonobo", "Bambro Koyo Ganda", "4:50"],
    ["Fred again..", "Delilah (pull me out of this)", "4:12"],
    ["Rüfüs Du Sol", "Innerbloom", "9:38"],
    ["Four Tet", "Baby", "3:58"],
    ["Overmono", "So U Kno", "3:58"],
    ["Caribou", "Never Come Back", "4:52"],
  ],
};

const MEAL_NUTRI = {
  time: "SUNDAY · 2 PM",
  title: "Sunday Batch Prep",
  sub: "5 meals · ~2 hours · from Rae",
};
const PLAYLIST_NUTRI = {
  name: "Sunday Meal Prep",
  provider: "spotify",
  bpm: "95–120",
  tracks: 32,
  duration: "2h 18m",
  accent: "#f2a94e",
  cover: "linear-gradient(135deg, #6a4a1c 0%, #1a1612 70%)",
  note: "2 hours. Enough to get through batch cooking without burning out — ends right as you're plating.",
  author: "Rae",
  authorRole: "Nutritionist",
  currentTrack: ["Khruangbin", "Maria También", "4:58"],
  sampleTracks: [
    ["Khruangbin", "Maria También", "4:58"],
    ["Mild High Club", "Homage", "3:40"],
    ["Unknown Mortal Orchestra", "Multi-Love", "4:26"],
    ["Mac DeMarco", "Chamber of Reflection", "4:42"],
    ["Men I Trust", "Show Me How", "3:51"],
  ],
};

// ─── Variant shells ──────────────────────────────────────
// A · Inline play button on workout/meal card (compact, lives on Today)
function VariantA({ ctx }) {
  const [playing, setPlaying] = useState(false);
  const data = ctx === "train" ? { w: WORKOUT_TRAIN, p: PLAYLIST_TRAIN, label: "TODAY" } : { w: MEAL_NUTRI, p: PLAYLIST_NUTRI, label: "THIS WEEK" };
  return (
    <div style={{ background: CP_PAPER, minHeight: "100%", padding: "8px 14px 100px" }}>
      <div style={{ fontFamily: cpMono, fontSize: 10, letterSpacing: "0.14em", color: "rgba(242,237,228,0.5)", marginTop: 14, marginBottom: 10 }}>{data.label}</div>
      <div style={{ fontFamily: cpSerif, fontSize: 32, letterSpacing: "-0.02em", lineHeight: 1.05, marginBottom: 18, color: CP_INK }}>
        {ctx === "train" ? "Pull day." : "Prep day."}
      </div>
      <WorkoutCardWithPlaylist workout={data.w} playlist={data.p} playing={playing} onPlay={() => setPlaying(p => !p)}/>
      <div style={{ marginTop: 14 }}>
        <WorkoutCardWithPlaylist
          workout={ctx === "train" ? { time: "TOMORROW · 9 AM", title: "Lower strength", sub: "52 min · from Maya" } : { time: "WEDNESDAY · 7 PM", title: "Sheet-pan salmon", sub: "28 min · from Rae" }}
          playlist={ctx === "train"
            ? { name: "Squat Day Bangers", provider: "spotify", bpm: "110–140", tracks: 22, accent: "#e86bd8", cover: "linear-gradient(135deg, #5a2a4a 0%, #1a1612 70%)", author: "Maya" }
            : { name: "Weeknight Dinner (30 min)", provider: "spotify", bpm: "100–128", tracks: 12, accent: "#e86bd8", cover: "linear-gradient(135deg, #5a2a4a 0%, #1a1612 70%)", author: "Rae" }}
          playing={false} onPlay={() => {}}/>
      </div>
      {playing && <NowPlayingDock playlist={data.p} playing={playing} onToggle={() => setPlaying(p=>!p)} progress={0.42}/>}
    </div>
  );
}

// B · Hero coach-note playlist (dedicated view, note is the hero)
function VariantB({ ctx }) {
  const [playing, setPlaying] = useState(false);
  const [hearted, setHearted] = useState(false);
  const [sendOpen, setSendOpen] = useState(false);
  const data = ctx === "train" ? PLAYLIST_TRAIN : PLAYLIST_NUTRI;
  return (
    <div style={{ background: CP_PAPER, minHeight: "100%", padding: "8px 14px 40px", position: "relative" }}>
      <div style={{ fontFamily: cpMono, fontSize: 10, letterSpacing: "0.14em", color: "rgba(242,237,228,0.5)", marginTop: 14, marginBottom: 10 }}>
        {ctx === "train" ? "FOR TODAY'S WORKOUT" : "FOR SUNDAY PREP"}
      </div>
      <HeroPlaylistCard
        playlist={data}
        playing={playing}
        onPlay={() => setPlaying(p => !p)}
        hearted={hearted}
        onHeart={() => setHearted(h => !h)}
        onSend={() => setSendOpen(true)}
      />
      <div style={{ marginTop: 22, fontFamily: cpMono, fontSize: 10, letterSpacing: "0.14em", color: "rgba(242,237,228,0.5)", marginBottom: 10 }}>TRACKLIST</div>
      <TrackList tracks={data.sampleTracks} accent={data.accent} currentIndex={playing ? 2 : -1}/>
      <SendToSheet open={sendOpen} playlist={data} onClose={() => setSendOpen(false)}/>
    </div>
  );
}

// C · Connect-music fallback state
function VariantC({ ctx }) {
  const data = ctx === "train" ? PLAYLIST_TRAIN : PLAYLIST_NUTRI;
  return (
    <div style={{ background: CP_PAPER, minHeight: "100%", padding: "8px 14px 40px" }}>
      <div style={{ fontFamily: cpMono, fontSize: 10, letterSpacing: "0.14em", color: "rgba(242,237,228,0.5)", marginTop: 14, marginBottom: 10 }}>
        {ctx === "train" ? "FOR TODAY'S WORKOUT" : "FOR SUNDAY PREP"}
      </div>
      <ConnectMusicCard playlist={data}/>
      <div style={{ padding: "16px 2px 10px", fontFamily: cpMono, fontSize: 10, letterSpacing: "0.14em", color: "rgba(242,237,228,0.5)" }}>PREVIEW · TRACKLIST</div>
      <TrackList tracks={data.sampleTracks} accent={data.accent}/>
    </div>
  );
}

// ─── Page ────────────────────────────────────────────────
const PAPER = "#1a1612", INK = "#f2ede4", TEAL_BRIGHT = "#2ee0c4";
const serif = "'Fraunces', serif", sans = "'Space Grotesk', sans-serif", mono = "'JetBrains Mono', monospace";

function Phone({ label, subtitle, children }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 14 }}>
      <div style={{ textAlign: "center", maxWidth: 380 }}>
        <div style={{ fontFamily: mono, fontSize: 10, letterSpacing: "0.16em", color: TEAL_BRIGHT, marginBottom: 6 }}>{label}</div>
        <div style={{ fontSize: 13, color: "rgba(242,237,228,0.65)", lineHeight: 1.5, textWrap: "pretty" }}>{subtitle}</div>
      </div>
      <IOSDevice dark={true} width={360} height={740}>
        {children}
      </IOSDevice>
    </div>
  );
}

function ClientPlaylistsPage() {
  const [ctx, setCtx] = useState("train"); // 'train' or 'nutri'

  return (
    <div style={{ minHeight: "100vh", padding: "48px 32px 80px", background: "radial-gradient(ellipse at top, #1a1612 0%, #0d0b09 60%)" }}>
      {/* Header */}
      <div style={{ maxWidth: 1300, margin: "0 auto 40px" }}>
        <div style={{ fontFamily: mono, fontSize: 11, letterSpacing: "0.18em", color: TEAL_BRIGHT, marginBottom: 10 }}>
          CLIENT MOBILE · THREE EXPLORATIONS
        </div>
        <div style={{ display: "flex", alignItems: "flex-end", gap: 24, flexWrap: "wrap", justifyContent: "space-between" }}>
          <div>
            <h1 style={{ fontFamily: serif, fontSize: 56, margin: 0, letterSpacing: "-0.025em", fontWeight: 400, color: INK, lineHeight: 1.02 }}>
              What the client sees.
            </h1>
            <p style={{ fontSize: 15, color: "rgba(242,237,228,0.7)", maxWidth: 720, lineHeight: 1.55, marginTop: 14 }}>
              Coach pastes a Spotify link → it lands on the client's workout or meal card as an inline play button. Mini-player controls their connected Spotify; coach note is the hero. Always skippable, graceful fallback for unlinked clients, and clients can pass a good playlist to a friend.
            </p>
          </div>
          {/* role toggle */}
          <div style={{ display: "inline-flex", gap: 4, background: "rgba(242,237,228,0.05)", padding: 4, borderRadius: 999, border: "1px solid rgba(242,237,228,0.1)" }}>
            {[["train","Trainer client"],["nutri","Nutritionist client"]].map(([k,l]) => (
              <button key={k} onClick={() => setCtx(k)} style={{
                background: ctx === k ? INK : "transparent",
                color: ctx === k ? PAPER : "rgba(242,237,228,0.75)",
                border: 0, padding: "9px 18px", borderRadius: 999,
                fontFamily: sans, fontSize: 12.5, fontWeight: 500, cursor: "pointer",
                letterSpacing: "0.02em",
              }}>{l}</button>
            ))}
          </div>
        </div>
      </div>

      {/* Phones row */}
      <div style={{ maxWidth: 1300, margin: "0 auto", display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 40, justifyItems: "center" }}>
        <Phone label="A · INLINE" subtitle={`Play button lives on the ${ctx === "train" ? "workout" : "meal"} card itself. Lowest friction — no new surface. When it's playing, a Shape-branded mini-player docks to the bottom.`}>
          <VariantA ctx={ctx}/>
        </Phone>
        <Phone label="B · COACH-NOTE HERO" subtitle={`Tap the card → dedicated playlist view. ${ctx === "train" ? "Maya's" : "Rae's"} note is the hero. Heart to save, send to a friend, or start playing.`}>
          <VariantB ctx={ctx}/>
        </Phone>
        <Phone label="C · UNCONNECTED FALLBACK" subtitle="Client hasn't linked Spotify yet. Graceful prompt with Skip option, full tracklist below so they can copy titles or browse.">
          <VariantC ctx={ctx}/>
        </Phone>
      </div>

      {/* Send-to-friend call out */}
      <div style={{ maxWidth: 1300, margin: "56px auto 0", background: "rgba(30,192,168,0.05)", border: "1px solid rgba(30,192,168,0.2)", borderRadius: 16, padding: "28px 32px", display: "grid", gridTemplateColumns: "1.2fr 1fr", gap: 40, alignItems: "center" }}>
        <div>
          <div style={{ fontFamily: mono, fontSize: 10, letterSpacing: "0.14em", color: TEAL_BRIGHT, marginBottom: 8 }}>BONUS · SOCIAL LOOP</div>
          <div style={{ fontFamily: serif, fontSize: 30, letterSpacing: "-0.018em", color: INK, marginBottom: 10 }}>Clients pass playlists to friends.</div>
          <div style={{ fontSize: 14, color: "rgba(242,237,228,0.7)", lineHeight: 1.55, marginBottom: 6 }}>
            The send-to sheet in variant B surfaces lifting buddies, run partners, Shape community groups, and coaches. Add a short note ("this got me through hill week") and it lands in their chat.
          </div>
          <div style={{ fontSize: 13, color: "rgba(242,237,228,0.55)", lineHeight: 1.55 }}>
            Same sheet on the coach side — trainers and nutritionists can forward playlists to each other. Attribution chains ("Rae → Maya → you") stay intact so coaches see what's resonating.
          </div>
        </div>
        <div style={{ fontSize: 12, color: "rgba(242,237,228,0.55)", fontFamily: mono, lineHeight: 1.7, letterSpacing: "0.04em", background: "rgba(0,0,0,0.25)", padding: 18, borderRadius: 10, border: "1px solid rgba(242,237,228,0.06)" }}>
          <div>→ Client receives playlist from Maya</div>
          <div>→ Hearts it, sends to Jordan w/ note</div>
          <div>→ Jordan plays during their own workout</div>
          <div style={{ color: TEAL_BRIGHT, marginTop: 6 }}>→ Maya sees +1 listen, +1 share</div>
        </div>
      </div>

      {/* Notes */}
      <div style={{ maxWidth: 1300, margin: "48px auto 0", fontSize: 12.5, color: "rgba(242,237,228,0.5)", lineHeight: 1.7, letterSpacing: "0.01em", fontFamily: mono }}>
        <div style={{ marginBottom: 6 }}>NOTES</div>
        <div>· All three variants share one mini-player + one send-sheet; only the entry surface differs.</div>
        <div>· iOS frame shown; Android is a straight port with Material play button and standard bottom sheet.</div>
        <div>· Toggle top-right switches between trainer and nutritionist client context — same components, different content.</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ClientPlaylistsPage/>);
</script>
</body>
</html>
