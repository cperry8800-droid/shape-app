<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Client Analytics · Shape</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>html,body{margin:0;padding:0;background:#1a1612}*{box-sizing:border-box}a{text-decoration:none;color:inherit}</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel" src="pageShell.jsx"></script>
<script type="text/babel" src="trainerDashboard.jsx"></script>
<script type="text/babel" src="clientNav.jsx"></script>
<script type="text/babel">
function ClientAnalyticsPage() {
  return (
    <DashShell
      role="client"
      userName="Priya"
      date="WEDNESDAY APR 18"
      greeting="Your analytics."
      primaryCta={["Open train", "ClientTrain.html"]}
      secondaryCta={["Open nutri", "ClientNutri.html"]}
      navItems={clientNavItems("analytics")}
      payoutCard={clientPayoutCard}
      kpis={[
        { k: "86%", l: "Workout adherence" },
        { k: "91%", l: "Macro adherence" },
        { k: "7h 18m", l: "Avg sleep" },
        { k: "+14", l: "Weekly points" },
      ]}
      scheduleTitle="Today’s focus"
      schedule={[
        { time: "TRAIN", who: "Upper pull", sub: "Last time: +5 lb on row", status: "NEXT" },
        { time: "NUTRI", who: "Lunch macro target", sub: "48P · 72C · 14F" },
        { time: "RECOV", who: "Sleep goal", sub: "7h minimum tonight" },
      ]}
      pulseTitle="Trend signals"
      pulse={[
        { who: "Workout consistency", sub: "4/5 this week", trend: [0.4,0.52,0.48,0.6,0.66,0.72,0.78] },
        { who: "Nutrition compliance", sub: "On target 6/7 days", trend: [0.5,0.56,0.6,0.58,0.65,0.7,0.74] },
        { who: "Sleep + recovery", sub: "Improving", trend: [0.3,0.35,0.42,0.45,0.5,0.56,0.62] },
      ]}
      extraSections={[{
        title: "Coach notes from analytics",
        render: () => (
          <div style={{ padding: 20, border: "1px solid rgba(242,237,228,0.12)", borderRadius: 12 }}>
            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, letterSpacing: "0.14em", textTransform: "uppercase", color: "rgba(242,237,228,0.7)", marginBottom: 10 }}>
              WEEKLY READOUT
            </div>
            <div style={{ fontFamily: "Fraunces, serif", fontSize: 22, lineHeight: 1.2, color: "#f2ede4", marginBottom: 8 }}>
              You perform best when sleep is above 7h and protein is hit by lunch.
            </div>
            <div style={{ fontFamily: "Space Grotesk, sans-serif", fontSize: 14, color: "rgba(242,237,228,0.72)" }}>
              Keep Wednesday hydration high before Thursday upper-push day.
            </div>
          </div>
        ),
      }]}
    />
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<ClientAnalyticsPage />);
</script>
<script src="globalChatButton.js" defer></script>
</body>
</html>
