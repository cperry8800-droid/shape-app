<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
function Row({ label, value, action }) {
  return (
    <div style={{ display: "grid", gridTemplateColumns: "1fr auto auto", gap: 12, alignItems: "center", padding: "14px 0", borderTop: "1px solid rgba(242,237,228,0.06)" }}>
      <div style={{ fontSize: 13.5, color: "rgba(242,237,228,0.6)" }}>{label}</div>
      <div style={{ fontSize: 13.5 }}>{value}</div>
      {action && <span style={{ fontSize: 12, color: TEAL_BRIGHT, fontFamily: "'JetBrains Mono', monospace", letterSpacing: "0.08em", cursor: "pointer" }}>{action}</span>}
    </div>
  );
}
const SAMPLE_PROFILE = {
  displayName: "Priya Shah",
  email: "priya.shah@hey.com",
  phone: "+1 (347) •••• 0412",
  location: "Brooklyn, NY",
  birthday: "Oct 4, 1993",
  heightWeight: "5'6\" · 171 lb",
  dietaryStyle: "Omnivore · high protein",
  allergies: "Shellfish, tree nuts",

  hydrationTarget: "3.0 L / day",
  primaryGoal: "Strength + hypertrophy",

  instagram: "@priya.lifts",

  website: "",
  youtube: "",
  twitter: "@priyas"

function EditProfileModal({ initial, onClose, onSaved }) {
  const [form, setForm] = React.useState(initial || {});
  const [saving, setSaving] = React.useState(false);
  const [err, setErr] = React.useState(null);
  const field = (key, label) => (
    <label style={{ display: "grid", gap: 4 }}>
      <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10.5, letterSpacing: "0.12em", color: "rgba(242,237,228,0.55)" }}>{label}</span>
      <input
        value={form[key] || ""}
        onChange={e => setForm({ ...form, [key]: e.target.value })}
        style={{ background: "rgba(242,237,228,0.04)", border: "1px solid rgba(242,237,228,0.14)", color: INK, padding: "10px 12px", borderRadius: 6, fontFamily: sans, fontSize: 13.5 }}
      />
    </label>
  );
  async function save() {
    setSaving(true); setErr(null);
    if (!window.shapeDb || !window.shapeDb.saveClientProfile) {
      setErr("Supabase client not loaded."); setSaving(false); return;
    }
    const res = await window.shapeDb.saveClientProfile(form);
    setSaving(false);
    if (res && res.error) { setErr(res.error.message || "Save failed"); return; }
    onSaved(form); onClose();
  }
  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(10,8,6,0.7)", backdropFilter: "blur(6px)", zIndex: 9999, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
      <div onClick={e => e.stopPropagation()} style={{ background: PAPER, border: "1px solid rgba(242,237,228,0.1)", borderRadius: 14, padding: 28, width: "100%", maxWidth: 720, maxHeight: "90vh", overflowY: "auto" }}>
        <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10.5, letterSpacing: "0.14em", color: TEAL_BRIGHT }}>EDIT · PROFILE</div>
        <div style={{ fontFamily: serif, fontSize: 30, letterSpacing: "-0.02em", margin: "6px 0 20px", color: INK }}>Your profile.</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, color: INK }}>
          {field("displayName", "NAME")}
          {field("email", "EMAIL")}
          {field("phone", "PHONE")}
          {field("location", "LOCATION")}
          {field("birthday", "BIRTHDAY")}
          {field("heightWeight", "HEIGHT / WEIGHT")}
          {field("primaryGoal", "PRIMARY GOAL")}
          {field("experience", "EXPERIENCE")}
          {field("dietaryStyle", "DIETARY STYLE")}
          {field("allergies", "ALLERGIES")}
          {field("proteinTarget", "PROTEIN TARGET")}
          {field("hydrationTarget", "HYDRATION TARGET")}
          {field("instagram", "INSTAGRAM")}
          {field("strava", "STRAVA")}
        </div>
        {err && <div style={{ color: "#e07856", fontSize: 13, marginTop: 14 }}>{err}</div>}
        <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 22 }}>
          <button onClick={onClose} style={{ background: "transparent", color: INK, border: "1px solid rgba(242,237,228,0.25)", padding: "10px 20px", borderRadius: 999, fontFamily: sans, fontSize: 13, cursor: "pointer" }}>Cancel</button>
          <button disabled={saving} onClick={save} style={{ background: INK, color: PAPER, border: 0, padding: "10px 22px", borderRadius: 999, fontFamily: sans, fontSize: 13, fontWeight: 500, cursor: saving ? "wait" : "pointer", opacity: saving ? 0.6 : 1 }}>{saving ? "Saving…" : "Save changes"}</button>
        </div>
      </div>
    </div>
  );
}

function ClientMePage() {
  const [profile, setProfile] = React.useState(SAMPLE_PROFILE);
  const [loaded, setLoaded] = React.useState(false);
  const [signedIn, setSignedIn] = React.useState(false);
  const [editOpen, setEditOpen] = React.useState(false);
  const [toast, setToast] = React.useState(null);

  React.useEffect(() => {
    (async () => {
      if (!window.shapeDb) { setLoaded(true); return; }
      const user = await window.shapeDb.getUser();
      if (!user) { setLoaded(true); return; }
      setSignedIn(true);
      const remote = await window.shapeDb.getClientProfile();
      if (remote && Object.keys(remote).length > 0) {
        setProfile(p => ({ ...p, ...remote }));
      }
      setLoaded(true);
    })();
  }, []);

  async function handleLogout() {
    if (window.shapeDb) await window.shapeDb.signOut();
    window.location.href = "/login";
  }

  const p = profile;
  return (
    <DashPage
      navItems={clientNavItems("me")}
      payoutCard={clientPayoutCard}
      eyebrow="PROFILE · SETTINGS · BILLING"
      title="Me"
      subtitle={signedIn ? "Your profile, plan, payments, and how Shape uses your data." : "Sample view — sign in to load your real profile."}
      actions={<>
        <button onClick={handleLogout} style={{ background: "transparent", color: INK, border: "1px solid rgba(242,237,228,0.25)", padding: "10px 20px", borderRadius: 999, fontFamily: sans, fontSize: 13, cursor: "pointer" }}>Log out</button>
        <button onClick={() => setEditOpen(true)} style={{ background: INK, color: PAPER, border: 0, padding: "10px 22px", borderRadius: 999, fontFamily: sans, fontSize: 13, fontWeight: 500, cursor: "pointer" }}>Edit profile</button>
      </>}
    >
      {/* Hero identity card + cover + avatar */}
      <ProfileHero
        eyebrow={`MEMBER · ${(p.location || "—").toUpperCase()} · SINCE FEB '26`}
        name={p.displayName || "—"}
        pills={[
          { label: "TEMPO · 1,284", tone: "teal" },
          { label: "2 COACHES" },
          { label: "14-DAY STREAK" },
        ]}
        score="1,284"
        scoreLabel="SHAPE SCORE"
        scoreCaption="+82 this week"
        stats={[["14 mo","Training on Shape"],["+22 lb","Squat PR this block"],["4 / 5","Sessions this week"],["168g","Avg protein / day"]]}
      />

      {/* Bio */}
      <BioCard
        charLimit={500}
        body="Product designer by day, lifter by evening. Working with Maya on strength + hypertrophy and with Rae on protein targets that don't feel like homework. Goals this year: a real 1.5×BW squat, a credible 5K, and finally figuring out how to fuel a long ride without bonking at mile 40."
      />

      {/* Today + side rail */}
      <div style={{ display: "grid", gridTemplateColumns: "1.4fr 1fr", gap: 20, marginBottom: 20 }}>
        <Card style={{ padding: 28 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 16 }}>
            <div>
              <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10.5, letterSpacing: "0.14em", color: TEAL_BRIGHT }}>WEDNESDAY, APRIL 18</div>
              <div style={{ fontFamily: serif, fontSize: 34, letterSpacing: "-0.02em", margin: "6px 0 0", lineHeight: 1 }}>Today.</div>
            </div>
            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: "rgba(242,237,228,0.5)", letterSpacing: "0.08em" }}>WK 6 / 12</div>
          </div>
          {[
            { when: "17:30", what: "Upper push · 5 exercises", with: "Maya Okafor" },
            { when: "19:30", what: "Log dinner · protein target 168g", with: null },
            { when: "21:00", what: "Mobility · 10 min", with: null },
          ].map((t,i)=>(
            <div key={i} style={{ display: "grid", gridTemplateColumns: "68px 1fr auto", gap: 16, padding: "18px 0", borderTop: "1px solid rgba(242,237,228,0.08)", alignItems: "center" }}>
              <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 13, color: INK, letterSpacing: "0.04em" }}>{t.when}</div>
              <div>
                <div style={{ fontFamily: serif, fontSize: 19, letterSpacing: "-0.01em", color: INK }}>{t.what}</div>
                {t.with && <div style={{ fontSize: 12.5, color: "rgba(242,237,228,0.55)", marginTop: 4 }}>with {t.with}</div>}
              </div>
              <button style={{ padding: "8px 14px", borderRadius: 6, border: "1px solid rgba(242,237,228,0.18)", background: "transparent", color: INK, fontFamily: sans, fontSize: 12, cursor: "pointer" }}>Open →</button>
            </div>
          ))}
          <div style={{ marginTop: 20, padding: 20, background: "rgba(30,192,168,0.08)", border: "1px solid rgba(30,192,168,0.22)", borderRadius: 10 }}>
            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: "0.14em", color: TEAL_BRIGHT, marginBottom: 8 }}>NOTE FROM MAYA · 2H AGO</div>
            <div style={{ fontFamily: serif, fontSize: 17, fontStyle: "italic", lineHeight: 1.45, letterSpacing: "-0.005em" }}>"Form check on the incline press last session was clean. Push to 60 lb today if bar speed stays crisp."</div>
            <div style={{ marginTop: 12, display: "flex", gap: 8 }}>
              <button style={{ background: TEAL, color: PAPER, border: 0, padding: "7px 13px", borderRadius: 999, fontSize: 11.5, fontWeight: 500, cursor: "pointer", fontFamily: sans }}>Reply</button>
              <button style={{ background: "transparent", color: INK, border: "1px solid rgba(242,237,228,0.2)", padding: "7px 13px", borderRadius: 999, fontSize: 11.5, cursor: "pointer", fontFamily: sans }}>Open thread</button>
            </div>
          </div>
        </Card>

        <div style={{ display: "grid", gap: 20, alignContent: "start" }}>
          <Card>
            <SectionTitle>This week</SectionTitle>
            <div style={{ display: "flex", alignItems: "flex-end", gap: 8, height: 110, padding: "4px 0 0" }}>
              {[["M",68],["T",82],["W",74],["T",91],["F",64],["S",88],["S",0]].map(([d,v],i)=>(
                <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
                  <div style={{ width: "100%", height: 92, display: "flex", alignItems: "flex-end" }}>
                    <div style={{ width: "100%", height: `${v}%`, background: v ? TEAL : "rgba(242,237,228,0.08)", borderRadius: 2 }} />
                  </div>
                  <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, color: "rgba(242,237,228,0.5)" }}>{d}</div>
                </div>
              ))}
            </div>
            <div style={{ fontSize: 12.5, color: "rgba(242,237,228,0.6)", marginTop: 12, paddingTop: 12, borderTop: "1px solid rgba(242,237,228,0.06)" }}>Training load trending up vs last week. Recovery holding.</div>
          </Card>

          <Card>
            <SectionTitle>My coaches</SectionTitle>
            {[
              ["Maya Okafor","Strength · Hypertrophy","Next: today 17:30"],
              ["Rae Lindqvist","Sports Nutrition","Weekly review Sunday"],
            ].map(([n,r,next],i)=>(
              <div key={i} style={{ display: "grid", gridTemplateColumns: "40px 1fr auto", gap: 12, padding: "14px 0", alignItems: "center", borderTop: i ? "1px solid rgba(242,237,228,0.06)" : "1px solid rgba(242,237,228,0.06)" }}>
                <div style={{ width: 40, height: 40, borderRadius: 999, background: "#efece6" }} />
                <div>
                  <div style={{ fontSize: 13.5, fontWeight: 500, color: INK }}>{n}</div>
                  <div style={{ fontSize: 11.5, color: "rgba(242,237,228,0.55)", marginTop: 2 }}>{r} · {next}</div>
                </div>
                <button style={{ padding: "6px 12px", borderRadius: 999, background: "rgba(30,192,168,0.12)", color: TEAL_BRIGHT, border: 0, fontFamily: "'JetBrains Mono', monospace", fontSize: 10.5, fontWeight: 500, cursor: "pointer", letterSpacing: "0.08em" }}>MESSAGE</button>
              </div>
            ))}
          </Card>
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
        <Card>
          <SectionTitle>Profile</SectionTitle>
          <Row label="Name" value={p.displayName || "—"} action="EDIT" />
          <Row label="Email" value={p.email || "—"} action="EDIT" />
          <Row label="Phone" value={p.phone || "—"} action="EDIT" />
          <Row label="Location" value={p.location || "—"} action="EDIT" />
          <Row label="Birthday" value={p.birthday || "—"} />
          <Row label="Height / weight" value={p.heightWeight || "—"} action="UPDATE" />
        </Card>

        <Card>
          <SectionTitle>Plan &amp; billing</SectionTitle>
          <Row label="Shape Platform" value="$5 / month" action="MANAGE" />
          <Row label="Maya — Strength + hybrid" value="$220 / month" action="MANAGE" />
          <Row label="Rae — Performance fuel" value="$180 / month" action="MANAGE" />
          <Row label="Total monthly" value="$405" />
          <Row label="Next charge" value="May 4, 2026" />
          <Row label="Payment method" value="Visa •••• 4290" action="UPDATE" />
        </Card>

        <Card>
          <SectionTitle>Connected apps</SectionTitle>
          <Row label="Apple Health" value="Connected" action="DISCONNECT" />
          <Row label="Whoop" value="Connected · syncing" action="DISCONNECT" />
          <Row label="Strava" value="Not connected" action="CONNECT" />
          <Row label="MyFitnessPal" value="Not connected" action="CONNECT" />
          <Row label="Garmin" value="Not connected" action="CONNECT" />
        </Card>

        <Card>
          <SectionTitle>Nutrition preferences</SectionTitle>
          <Row label="Dietary style" value={p.dietaryStyle || "—"} action="EDIT" />
          <Row label="Allergies &amp; intolerances" value={p.allergies || "—"} action="EDIT" />
          <Row label="Dislikes" value={p.dislikes || "—"} action="EDIT" />
          <Row label="Protein target" value={p.proteinTarget || "—"} action="EDIT" />
          <Row label="Calorie range" value={p.calorieRange || "—"} action="CHANGE" />
          <Row label="Meal cadence" value={p.mealCadence || "—"} action="EDIT" />
          <Row label="Kitchen &amp; cooking" value={p.kitchen || "—"} action="EDIT" />
          <Row label="Supplements" value={p.supplements || "—"} action="EDIT" />
          <Row label="Alcohol" value={p.alcohol || "—"} action="EDIT" />
          <Row label="Hydration target" value={p.hydrationTarget || "—"} action="EDIT" />
        </Card>

        <Card>
          <SectionTitle>Training preferences</SectionTitle>
          <Row label="Primary goal" value={p.primaryGoal || "—"} action="EDIT" />
          <Row label="Experience" value={p.experience || "—"} action="EDIT" />
          <Row label="Sessions / week" value={p.sessionsPerWeek || "—"} action="EDIT" />
          <Row label="Equipment access" value={p.equipmentAccess || "—"} action="EDIT" />
          <Row label="Injuries &amp; notes" value={p.injuries || "—"} action="EDIT" />
          <Row label="Preferred training times" value={p.preferredTimes || "—"} action="EDIT" />
        </Card>

        <Card>
          <SectionTitle>Privacy &amp; notifications</SectionTitle>
          <Row label="Profile visibility" value="Community only" action="CHANGE" />
          <Row label="Share data with coaches" value="All metrics" action="CHANGE" />
          <Row label="Community posts" value="On" action="TOGGLE" />
          <Row label="Coach messages" value="Push + email" action="CHANGE" />
          <Row label="Weekly digest" value="Sunday 8am" action="CHANGE" />
          <Row label="Marketing emails" value="Off" action="TOGGLE" />
        </Card>
      </div>

      <Card style={{ marginTop: 20 }}>
        <SectionTitle>Social &amp; links</SectionTitle>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 32px" }}>
          <Row label="Instagram" value={p.instagram || "Not connected"} action="EDIT" />
          <Row label="TikTok" value={p.tiktok || "Not connected"} action="CONNECT" />
          <Row label="Strava" value={p.strava || "Not connected"} action="EDIT" />
          <Row label="Website" value={p.website || "Not added"} action="ADD" />
          <Row label="YouTube" value={p.youtube || "Not connected"} action="CONNECT" />
          <Row label="Twitter / X" value={p.twitter || "Not connected"} action="EDIT" />
        </div>
      </Card>

      <Card style={{ marginTop: 20, padding: 22 }}>
        <SectionTitle>Danger zone</SectionTitle>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 16 }}>
          <button style={{ background: "transparent", color: "rgba(242,237,228,0.7)", border: "1px solid rgba(242,237,228,0.2)", padding: "14px 16px", borderRadius: 8, fontSize: 13, cursor: "pointer", fontFamily: sans, textAlign: "left" }}>Export all my data</button>
          <button style={{ background: "transparent", color: "rgba(242,237,228,0.7)", border: "1px solid rgba(242,237,228,0.2)", padding: "14px 16px", borderRadius: 8, fontSize: 13, cursor: "pointer", fontFamily: sans, textAlign: "left" }}>Pause membership</button>
          <button style={{ background: "transparent", color: "#e07856", border: "1px solid rgba(224,120,86,0.4)", padding: "14px 16px", borderRadius: 8, fontSize: 13, cursor: "pointer", fontFamily: sans, textAlign: "left" }}>Delete account</button>
        </div>
      </Card>
      {editOpen && (
        <EditProfileModal
          initial={profile}
          onClose={() => setEditOpen(false)}
          onSaved={(next) => {
            setProfile(p => ({ ...p, ...next }));
            setToast(signedIn ? "Profile saved." : "Sign in to save changes.");
            setTimeout(() => setToast(null), 2500);
          }}
        />
      )}
      {toast && (
        <div style={{ position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", background: INK, color: PAPER, padding: "12px 22px", borderRadius: 999, fontFamily: sans, fontSize: 13, fontWeight: 500, zIndex: 10000, boxShadow: "0 10px 40px rgba(0,0,0,0.5)" }}>{toast}</div>
      )}
    </DashPage>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(
  <React.Fragment>
    <ClientMePage />
    <ChatWidget tabs={clientChatTabs} />
  </React.Fragment>
);
</script>
</body>
</html>
