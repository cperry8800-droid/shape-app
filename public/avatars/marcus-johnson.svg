<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C3AED"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
    <linearGradient id="skin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C68642"/>
      <stop offset="100%" stop-color="#8D5524"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- Body/shoulders -->
  <ellipse cx="200" cy="420" rx="140" ry="100" fill="#1a1a1a"/>
  <!-- Neck -->
  <rect x="175" y="280" width="50" height="40" rx="4" fill="url(#skin)"/>
  <!-- Head -->
  <ellipse cx="200" cy="220" rx="70" ry="80" fill="url(#skin)"/>
  <!-- Hair -->
  <ellipse cx="200" cy="165" rx="65" ry="35" fill="#1a1a1a"/>
  <rect x="135" y="160" width="130" height="30" rx="4" fill="#1a1a1a"/>
  <!-- Eyes -->
  <ellipse cx="175" cy="220" rx="8" ry="5" fill="#1a1a1a"/>
  <ellipse cx="225" cy="220" rx="8" ry="5" fill="#1a1a1a"/>
  <!-- Eyebrows -->
  <rect x="163" y="207" width="24" height="3" rx="1.5" fill="#1a1a1a"/>
  <rect x="213" y="207" width="24" height="3" rx="1.5" fill="#1a1a1a"/>
  <!-- Nose -->
  <ellipse cx="200" cy="240" rx="6" ry="4" fill="#A0652E" opacity="0.5"/>
  <!-- Smile -->
  <path d="M185 255 Q200 268 215 255" stroke="#8D5524" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Beard shadow -->
  <path d="M155 250 Q200 300 245 250" fill="#3a2010" opacity="0.3"/>
  <!-- Tank top strap -->
  <rect x="165" y="300" width="30" height="20" fill="#1a1a1a"/>
  <rect x="205" y="300" width="30" height="20" fill="#1a1a1a"/>
  <!-- Dumbbell icon accent -->
  <rect x="30" y="350" width="40" height="12" rx="6" fill="white" opacity="0.15"/>
  <rect x="20" y="344" width="14" height="24" rx="3" fill="white" opacity="0.15"/>
  <rect x="66" y="344" width="14" height="24" rx="3" fill="white" opacity="0.15"/>
</svg>