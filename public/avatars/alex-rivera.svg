  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <ellipse cx="200" cy="420" rx="130" ry="95" fill="#f8f8f8"/>
  <rect x="180" y="280" width="40" height="35" rx="4" fill="url(#skin)"/>
