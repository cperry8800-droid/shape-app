<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shape Radio — Live Music While You Train</title>
  <meta name="description" content="Shape Radio — live music while you train. Curated workout playlists included with your Shape membership.">
  <link rel="canonical" href="https://theshapecommunity.com/radio.html">
  <meta property="og:site_name" content="Shape">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://theshapecommunity.com/radio.html">
  <meta property="og:title" content="Shape Radio — Live Music While You Train">
  <meta property="og:description" content="Shape Radio — live music while you train. Curated workout playlists included with your Shape membership.">
  <meta property="og:image" content="https://theshapecommunity.com/icon-512.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Shape Radio — Live Music While You Train">
  <meta name="twitter:description" content="Shape Radio — live music while you train. Curated workout playlists included with your Shape membership.">
  <meta name="twitter:image" content="https://theshapecommunity.com/icon-512.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    html { background: #000 !important; }
    body.radio-page { background: transparent !important; position: relative; color: #fff; min-height: 100vh; }
    body.radio-page::before {
      content: ''; position: fixed; inset: 0; z-index: -1;
      background-image: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.65) 100%), url('/less%20bright.png');
      background-size: cover; background-position: center center; background-repeat: no-repeat;
    }
    .now-playing, .track-item, .playlist-card, .section-alt {
      background: rgba(10,10,10,0.35) !important;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .radio-nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 48px;
    }
    .radio-nav img { height: 64px; }
    .radio-nav a.back-link {
      color: rgba(255,255,255,0.5); font-size: 0.82rem; font-weight: 400;
      letter-spacing: 0.02em; transition: color 0.3s;
    }
    .radio-nav a.back-link:hover { color: #fff; }

    .radio-hero {
      text-align: center; padding: 80px 48px 60px;
    }
    .radio-logo {
      font-family: 'Inter', sans-serif; font-weight: 300; font-size: clamp(1.7rem, 2.8vw, 2.1rem);
      letter-spacing: 0.35em; text-transform: uppercase; margin-bottom: 16px; color: #fff;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .radio-logo .shape-text {
      display: inline-block; height: 36px; overflow: hidden; line-height: 0;
    }
    .radio-logo .shape-text img {
      height: 104px;
      margin-top: -62px;
    }
    .radio-logo .radio-label { color: #2DD4BF; }
    .radio-tagline {
      font-size: clamp(0.9rem, 1.2vw, 1.05rem); color: rgba(255,255,255,0.5);
      font-weight: 300; max-width: 500px; margin: 0 auto;
    }

    .radio-player {
      max-width: 600px; margin: 0 auto; padding: 0 48px;
    }

    .now-playing {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; padding: 48px; text-align: center; margin-bottom: 40px;
    }
    .np-visualizer {
      display: flex; align-items: flex-end; justify-content: center;
      gap: 4px; height: 60px; margin-bottom: 32px;
    }
    .np-bar {
      width: 4px; background: #2DD4BF; border-radius: 2px;
      animation: pulse-bar 1.2s ease-in-out infinite;
    }
    .np-bar:nth-child(1) { height: 20px; animation-delay: 0s; }
    .np-bar:nth-child(2) { height: 35px; animation-delay: 0.1s; }
    .np-bar:nth-child(3) { height: 50px; animation-delay: 0.2s; }
    .np-bar:nth-child(4) { height: 25px; animation-delay: 0.3s; }
    .np-bar:nth-child(5) { height: 45px; animation-delay: 0.15s; }
    .np-bar:nth-child(6) { height: 30px; animation-delay: 0.25s; }
    .np-bar:nth-child(7) { height: 55px; animation-delay: 0.05s; }
    .np-bar:nth-child(8) { height: 20px; animation-delay: 0.35s; }
    .np-bar:nth-child(9) { height: 40px; animation-delay: 0.1s; }
    .np-bar:nth-child(10) { height: 28px; animation-delay: 0.2s; }
    .np-bar:nth-child(11) { height: 48px; animation-delay: 0.3s; }
    .np-bar:nth-child(12) { height: 22px; animation-delay: 0.15s; }

    .paused .np-bar { animation-play-state: paused; }

    @keyframes pulse-bar {
      0%, 100% { transform: scaleY(0.4); opacity: 0.6; }
      50% { transform: scaleY(1); opacity: 1; }
    }

    .np-label {
      font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.15em;
      color: #2DD4BF; margin-bottom: 12px; font-weight: 500;
    }
    .np-title {
      font-size: clamp(1.2rem, 2vw, 1.5rem); font-weight: 400; margin-bottom: 4px;
    }
    .np-artist { color: rgba(255,255,255,0.5); font-size: 0.92rem; font-weight: 300; }

    .radio-controls {
      display: flex; align-items: center; justify-content: center; gap: 32px;
      margin-bottom: 32px;
    }
    .radio-btn {
      background: none; border: none; color: rgba(255,255,255,0.5); cursor: pointer;
      transition: color 0.3s; font-size: 1.2rem;
    }
    .radio-btn:hover { color: #fff; }
    .radio-btn-play {
      width: 64px; height: 64px; border-radius: 50%;
      background: #2DD4BF; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.3s;
    }
    .radio-btn-play:hover { background: #14B8A6; transform: scale(1.05); }
    .radio-btn-play svg { width: 24px; height: 24px; fill: #0a0a0a; }

    .volume-control {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      margin-bottom: 48px;
    }
    .volume-control svg { width: 18px; height: 18px; stroke: rgba(255,255,255,0.4); fill: none; stroke-width: 2; }
    .volume-slider {
      -webkit-appearance: none; width: 120px; height: 3px;
      background: rgba(255,255,255,0.15); border-radius: 2px; outline: none;
    }
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      border-radius: 50%; background: #2DD4BF; cursor: pointer;
    }

    .stations { margin-bottom: 80px; }
    .stations h3 {
      font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.15em;
      color: rgba(255,255,255,0.4); margin-bottom: 20px; font-weight: 500;
      text-align: center;
    }
    .station-list { display: flex; flex-direction: column; gap: 8px; }
    .station {
      display: flex; align-items: center; gap: 16px; padding: 16px 20px;
      border-radius: 12px; cursor: pointer; transition: all 0.3s;
      border: 1px solid transparent;
    }
    .station:hover { background: rgba(255,255,255,0.05); }
    .station.active { background: rgba(45,212,191,0.08); border-color: rgba(45,212,191,0.2); }
    .station-icon {
      width: 44px; height: 44px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; flex-shrink: 0;
    }
    .station-info { flex: 1; }
    .station-name { font-size: 0.95rem; font-weight: 500; margin-bottom: 2px; }
    .station-desc { font-size: 0.82rem; color: rgba(255,255,255,0.4); font-weight: 300; }
    .station-live {
      font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: #2DD4BF; font-weight: 600;
    }

    .radio-footer {
      text-align: center; padding: 40px 48px;
      border-top: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.3); font-size: 0.82rem; font-weight: 300;
    }

    /* Radio Login Gate */
    .radio-gate {
      display: flex; align-items: center; justify-content: center;
      min-height: calc(100vh - 100px); padding: 48px;
    }
    .radio-gate-box {
      max-width: 420px; width: 100%; text-align: center;
    }
    .radio-gate-box h2 {
      font-size: 1.6rem; font-weight: 300; margin-bottom: 8px; letter-spacing: -0.02em;
    }
    .radio-gate-box .subtitle {
      color: rgba(255,255,255,0.5); font-size: 0.92rem; font-weight: 300; margin-bottom: 32px;
    }
    .radio-gate-box .form-group { text-align: left; margin-bottom: 20px; }
    .radio-gate-box label {
      display: block; font-size: 0.78rem; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 8px; color: rgba(255,255,255,0.6);
    }
    .radio-gate-box input {
      width: 100%; padding: 14px 16px; border: 1px solid rgba(255,255,255,0.15);
      background: transparent; color: #fff; font-size: 0.92rem;
      font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.3s;
      border-radius: 0; box-sizing: border-box;
    }
    .radio-gate-box input::placeholder { color: rgba(255,255,255,0.3); }
    .radio-gate-box input:focus { border-color: #2DD4BF; }
    .radio-gate-box input:-webkit-autofill,
    .radio-gate-box input:-webkit-autofill:hover,
    .radio-gate-box input:-webkit-autofill:focus,
    .radio-gate-box input:-webkit-autofill:active {
      -webkit-text-fill-color: #fff !important;
      -webkit-box-shadow: 0 0 0 1000px transparent inset !important;
      box-shadow: 0 0 0 1000px transparent inset !important;
      caret-color: #fff;
      transition: background-color 9999s ease-in-out 0s;
    }
    .radio-gate-box .btn-radio-login {
      width: 100%; padding: 16px; background: transparent; color: #FFFFFF;
      border: 1px solid rgba(255,255,255,0.15); font-size: 0.88rem; font-weight: 500; font-family: 'Inter', sans-serif;
      cursor: pointer; text-transform: uppercase; letter-spacing: 0.06em;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); margin-bottom: 16px;
    }
    .radio-gate-box .btn-radio-login:hover { background: #FFFFFF; color: #0a0a0a; }
    .radio-gate-box .gate-divider {
      display: flex; align-items: center; gap: 16px; margin: 24px 0;
      color: rgba(255,255,255,0.3); font-size: 0.78rem; font-weight: 400;
    }
    .radio-gate-box .gate-divider::before,
    .radio-gate-box .gate-divider::after {
      content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.1);
    }
    .radio-gate-box .btn-radio-subscribe {
      width: 100%; padding: 16px; background: transparent; color: #fff;
      border: 1px solid rgba(255,255,255,0.2); font-size: 0.88rem; font-weight: 500;
      font-family: 'Inter', sans-serif; cursor: pointer; letter-spacing: 0.02em;
      transition: all 0.3s;
    }
    .radio-gate-box .btn-radio-subscribe:hover { border-color: #2DD4BF; color: #2DD4BF; }
    .radio-gate-price {
      font-size: 0.82rem; color: rgba(255,255,255,0.4); font-weight: 300; margin-top: 16px;
    }
    .radio-content { display: none; }
    .radio-content.active { display: block; }

    @media (max-width: 768px) {
      .radio-nav { padding: 24px; }
      .radio-hero { padding: 60px 24px 40px; }
      .radio-player { padding: 0 24px; }
      .now-playing { padding: 32px 24px; }
      .radio-footer { padding: 32px 24px; }
      .radio-gate { padding: 24px; min-height: calc(100vh - 80px); }
    }

    @media (max-width: 480px) {
      .radio-logo {
        font-size: 1.25rem;
        letter-spacing: 0.22em;
        gap: 6px;
        white-space: nowrap;
      }
      .radio-logo .shape-text { height: 26px; }
      .radio-logo .shape-text img {
        height: 76px;
        margin-top: -45px;
      }
      /* the trailing letter-spacing adds phantom space on the right;
         nudge the block left so the wordmark looks visually centered */
      .radio-logo .radio-label { margin-right: -0.22em; }
    }
  </style>

  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<body class="radio-page">

  <nav class="radio-nav">
    <a href="home.html"><img src="logo.png" alt="Shape"></a>
    <a href="home.html" class="back-link">Back to Shape</a>
  </nav>

  <!-- Login Gate -->
  <div class="radio-gate" id="radioGate">
    <div class="radio-gate-box">
      <div class="radio-logo" style="margin-bottom:24px;"><span class="shape-text"><img src="logo.png" alt="Shape"></span><span class="radio-label">R A D I O</span></div>
      <h2>Welcome back</h2>
      <p class="subtitle">Shape Radio is included with every Shape account.</p>
      <button class="btn-radio-login" onclick="radioGoLogin()">Log In to Your Shape Account</button>
      <div class="gate-divider">or</div>
      <button class="btn-radio-subscribe" onclick="radioSubscribe()">Create an Account</button>
      <p class="radio-gate-price">Included free with your <a href="landing.html" style="color:#2DD4BF;">Shape membership — $5/mo</a>.</p>
    </div>
  </div>

  <!-- Radio Content (hidden until login) -->
  <div class="radio-content" id="radioContent">
  <section class="radio-hero">
    <div class="radio-logo"><span class="shape-text"><img src="logo.png" alt="Shape"></span><span class="radio-label">R A D I O</span></div>
    <p class="radio-tagline">Live music to fuel your workout.</p>
  </section>

  <div class="radio-player">
    <div class="now-playing" id="nowPlaying">
      <div class="np-visualizer" id="visualizer">
        <div class="np-bar"></div><div class="np-bar"></div><div class="np-bar"></div>
        <div class="np-bar"></div><div class="np-bar"></div><div class="np-bar"></div>
        <div class="np-bar"></div><div class="np-bar"></div><div class="np-bar"></div>
        <div class="np-bar"></div><div class="np-bar"></div><div class="np-bar"></div>
      </div>
      <div class="np-label">NOW PLAYING</div>
      <div class="np-title" id="npTitle">—</div>
      <div class="np-artist" id="npArtist">—</div>
    </div>

    <div class="radio-controls">
      <button class="radio-btn-prev" id="prevBtn" onclick="prevTrack()" aria-label="Previous track" title="Previous" style="background:none;border:none;color:rgba(255,255,255,0.7);cursor:pointer;padding:12px;">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><polygon points="6,5 6,19 8,19 8,5"/><polygon points="20,5 9,12 20,19"/></svg>
      </button>
      <button class="radio-btn-play" id="playBtn" onclick="togglePlay()">
        <svg id="playIcon" viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19"/></svg>
        <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none;"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <button class="radio-btn-next" id="nextBtn" onclick="nextTrack()" aria-label="Next track" title="Next" style="background:none;border:none;color:rgba(255,255,255,0.7);cursor:pointer;padding:12px;">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor"><polygon points="4,5 15,12 4,19"/><polygon points="16,5 16,19 18,19 18,5"/></svg>
      </button>
    </div>

    <div class="volume-control">
      <svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" stroke-linejoin="round"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
      <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="75">
      <svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" stroke-linejoin="round"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
    </div>

    <audio id="radioAudio" preload="none" crossorigin="anonymous"></audio>

  </div>

  <!-- Trainer-curated playlists — shows for signed-in subscribers -->
  <section id="trainerPlaylistsSection" class="section" style="display:none;max-width:960px;margin:40px auto 20px;padding:0 24px;">
    <div style="font-family:'Inter',sans-serif;font-weight:300;letter-spacing:0.28em;text-transform:uppercase;font-size:0.86rem;color:rgba(255,255,255,0.9);margin-bottom:18px;">From Your Trainers</div>
    <div id="trainerPlaylistsGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;"></div>
  </section>

  </div><!-- end radio-content -->

  <footer class="radio-footer">
    <p>&copy; 2026 Shape Radio. All rights reserved.</p>
  </footer>

  <script>
    // ===== Shape Radio playlist =====
    // Swap these entries with your licensed track URLs (Epidemic Sound,
    // Artlist, Soundstripe exports, or your own hosted MP3/HLS files).
    // Each track: { title, artist, src }. Tracks loop from the top.
    // Placeholder tracks below are free demo MP3s from SoundHelix, meant
    // only to prove the player works end-to-end.
    var SHAPE_RADIO_PLAYLIST = [
      { title: "Actin' Tough",  artist: 'Dean Turnley',  src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3' },
      { title: 'Tempo Lift',    artist: 'Shape Radio',   src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3' },
      { title: 'Main Set',      artist: 'Shape Radio',   src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-12.mp3' },
      { title: 'Push',          artist: 'Shape Radio',   src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3' },
      { title: 'Cool Down',     artist: 'Shape Radio',   src: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-14.mp3' }
    ];

    var audio = document.getElementById('radioAudio');
    var visualizer = document.getElementById('visualizer');
    var playIcon = document.getElementById('playIcon');
    var pauseIcon = document.getElementById('pauseIcon');
    var npTitle = document.getElementById('npTitle');
    var npArtist = document.getElementById('npArtist');
    var volumeSlider = document.getElementById('volumeSlider');
    var trackIndex = 0;

    visualizer.classList.add('paused');
    audio.volume = (parseInt(volumeSlider.value, 10) || 75) / 100;

    function loadTrack(idx) {
      if (!SHAPE_RADIO_PLAYLIST.length) return;
      trackIndex = ((idx % SHAPE_RADIO_PLAYLIST.length) + SHAPE_RADIO_PLAYLIST.length) % SHAPE_RADIO_PLAYLIST.length;
      var t = SHAPE_RADIO_PLAYLIST[trackIndex];
      audio.src = t.src;
      npTitle.textContent = t.title || '—';
      npArtist.textContent = t.artist || '—';
      if ('mediaSession' in navigator) {
        try {
          navigator.mediaSession.metadata = new MediaMetadata({
            title: t.title || 'Shape Radio',
            artist: t.artist || 'Shape Radio',
            album: 'Shape Radio'
          });
        } catch (e) {}
      }
    }

    function syncPlayUI(playing) {
      playIcon.style.display = playing ? 'none' : 'block';
      pauseIcon.style.display = playing ? 'block' : 'none';
      visualizer.classList.toggle('paused', !playing);
    }

    function togglePlay() {
      if (!audio.src) loadTrack(trackIndex);
      if (audio.paused) {
        var p = audio.play();
        if (p && typeof p.catch === 'function') {
          p.catch(function (err) {
            console.warn('[shape-radio] play blocked:', err);
            syncPlayUI(false);
          });
        }
      } else {
        audio.pause();
      }
    }

    function nextTrack() {
      var wasPlaying = !audio.paused && !audio.ended;
      loadTrack(trackIndex + 1);
      if (wasPlaying) audio.play().catch(function () {});
    }

    function prevTrack() {
      var wasPlaying = !audio.paused && !audio.ended;
      // If we're >3s into the current track, restart it instead of going back.
      if (audio.currentTime > 3) {
        audio.currentTime = 0;
        return;
      }
      loadTrack(trackIndex - 1);
      if (wasPlaying) audio.play().catch(function () {});
    }

    audio.addEventListener('play', function () { syncPlayUI(true); });
    audio.addEventListener('playing', function () { syncPlayUI(true); });
    audio.addEventListener('pause', function () { syncPlayUI(false); });
    audio.addEventListener('ended', function () {
      loadTrack(trackIndex + 1);
      audio.play().catch(function () { syncPlayUI(false); });
    });
    audio.addEventListener('error', function () {
      console.warn('[shape-radio] track failed, skipping:', audio.src);
      loadTrack(trackIndex + 1);
      audio.play().catch(function () { syncPlayUI(false); });
    });

    volumeSlider.addEventListener('input', function () {
      audio.volume = (parseInt(volumeSlider.value, 10) || 0) / 100;
    });

    if ('mediaSession' in navigator) {
      try {
        navigator.mediaSession.setActionHandler('play', function () { audio.play(); });
        navigator.mediaSession.setActionHandler('pause', function () { audio.pause(); });
        navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
        navigator.mediaSession.setActionHandler('nexttrack', nextTrack);
      } catch (e) {}
    }

    // ===== Trainer playlists =====
    function escHtml(s) {
      return String(s).replace(/[&<>"']/g, function (c) {
        return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
      });
    }
    async function loadTrainerPlaylists() {
      if (!window.shapeDb || !window.shapeDb.listPlaylistsForMe) return;
      try {
        var res = await window.shapeDb.listPlaylistsForMe();
        var list = (res && res.data) || [];
        if (!list.length) return;
        var grid = document.getElementById('trainerPlaylistsGrid');
        grid.innerHTML = list.map(function (p) {
          var embed = 'https://open.spotify.com/embed/playlist/' + encodeURIComponent(p.spotify_playlist_id) + '?theme=0';
          return '<div style="background:rgba(10,10,10,0.45);border:1px solid rgba(255,255,255,0.08);padding:14px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);">'
            + '<div style="font-size:0.76rem;color:rgba(45,212,191,0.9);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:4px;">' + escHtml(p.trainer_name) + '</div>'
            + '<div style="font-size:1rem;font-weight:500;margin-bottom:4px;color:#fff;">' + escHtml(p.title) + '</div>'
            + (p.description ? '<div style="font-size:0.82rem;color:rgba(255,255,255,0.6);margin-bottom:12px;">' + escHtml(p.description) + '</div>' : '<div style="height:8px;"></div>')
            + '<iframe style="border-radius:8px;" src="' + embed + '" width="100%" height="152" frameborder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>'
            + '</div>';
        }).join('');
        document.getElementById('trainerPlaylistsSection').style.display = 'block';
      } catch (e) { /* ignore */ }
    }

    // ===== Auth gate =====
    function openRadio(autoPlay) {
      document.getElementById('radioGate').style.display = 'none';
      document.getElementById('radioContent').classList.add('active');
      loadTrack(0);
      if (autoPlay) {
        var p = audio.play();
        if (p && typeof p.catch === 'function') {
          p.catch(function () { /* autoplay blocked; user will click play */ });
        }
      }
      loadTrainerPlaylists();
    }

    function radioGoLogin() {
      window.location.href = 'login.html?next=/radio.html';
    }

    function radioSubscribe() {
      window.location.href = 'signup-client.html?next=/radio.html';
    }

    // Only a real Shape (Supabase) session unlocks radio.
    (async function () {
      try {
        for (var i = 0; i < 40 && !window.shapeDb; i++) {
          await new Promise(function (r) { setTimeout(r, 50); });
        }
        if (!window.shapeDb) return;
        var session = await window.shapeDb.getSession();
        if (session) openRadio(false);
      } catch (e) {}
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="/pwa-install.js" defer></script>
</body>
</html>
