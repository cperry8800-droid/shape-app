<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Clients · Shape</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>html,body{margin:0;padding:0;background:#1a1612}*{box-sizing:border-box}a{text-decoration:none;color:inherit}</style>
<link rel="stylesheet" href="mobilePreview.css" />
</head>
<body><div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="pageShell.jsx"></script>
<script type="text/babel" src="trainerDashboard.jsx"></script>
<script type="text/babel" src="coachNav.jsx"></script>
<script type="text/babel">
function NutritionistClientsPage() {
  const clients = [
    ["Elena Rivera",   "Performance fuel", "Peak · 2,108",  "30d", "96%", "$180", [0.5,0.6,0.7,0.6,0.8,0.85,0.9], ""],
    ["Marcus Larson",  "Protein-led cut",  "Tempo · 1,140", "18d", "82%", "$160", [0.5,0.4,0.6,0.5,0.4,0.5,0.45], "FLAG"],
    ["Priya Shah",     "Performance fuel", "Tempo · 1,284", "14d", "89%", "$180", [0.4,0.3,0.5,0.4,0.6,0.5,0.7], ""],
    ["Jonah Weiss",    "Race-day fueling", "Tempo · 980",   "7d",  "78%", "$160", [0.4,0.5,0.45,0.6,0.5,0.7,0.6], "FLAG"],
    ["Ana Park",       "Intake · new",     "Raw · 412",     "1d",  "—",   "$140", [0.1,0.1,0.1,0.2,0.1,0.1,0.2], "NEW"],
    ["Deandre Kim",    "Mass phase",       "Peak · 1,820",  "22d", "94%", "$180", [0.5,0.6,0.55,0.7,0.65,0.8,0.75], ""],
    ["Jaya Patel",     "Plant-forward",    "Tempo · 1,102", "11d", "91%", "$160", [0.3,0.4,0.5,0.4,0.6,0.5,0.6], ""],
  ];
  return (
    <DashPage
      navItems={nutriNavItems("clients")}
      payoutCard={nutriPayoutCard}
      eyebrow="28 ACTIVE · 2 FLAGGED · 1 IN INTAKE"
      title="Clients"
      subtitle="Everyone you're feeding. Flags highlight adherence dips, protein shortfalls, or missed logs — so you can intervene before the week ends."
      actions={<>
        <button style={{ background: "transparent", color: INK, border: "1px solid rgba(242,237,228,0.25)", padding: "10px 20px", borderRadius: 999, fontFamily: sans, fontSize: 13, cursor: "pointer" }}>Filter</button>
        <button style={{ background: INK, color: PAPER, border: 0, padding: "10px 22px", borderRadius: 999, fontFamily: sans, fontSize: 13, fontWeight: 500, cursor: "pointer" }}>Invite client</button>
      </>}
    >
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 16, marginBottom: 20 }}>
        {[{k:"28",l:"Active"},{k:"89%",l:"Avg log adherence"},{k:"18d",l:"Avg streak"},{k:"$4,520",l:"MRR"}].map((x,i)=>(
          <Card key={i} style={{ padding: "22px 22px 20px" }}>
            <div style={{ fontFamily: serif, fontSize: 40, letterSpacing: "-0.02em", lineHeight: 1 }}>{x.k}</div>
            <div style={{ fontSize: 13, marginTop: 12 }}>{x.l}</div>
          </Card>
        ))}
      </div>
      <Card>
        <div style={{ display: "grid", gridTemplateColumns: "1.4fr 1.2fr 1fr 70px 80px 80px 80px 60px", gap: 12, padding: "6px 4px 14px", fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: "0.08em", color: "rgba(242,237,228,0.5)", borderBottom: "1px solid rgba(242,237,228,0.08)" }}>
          <span>CLIENT</span><span>PLAN</span><span>TIER</span><span>STREAK</span><span>ADHERENCE</span><span>MRR</span><span>30D</span><span></span>
        </div>
        {clients.map((c, i) => (
          <div key={i} style={{ display: "grid", gridTemplateColumns: "1.4fr 1.2fr 1fr 70px 80px 80px 80px 60px", gap: 12, padding: "14px 4px", alignItems: "center", borderTop: i === 0 ? "none" : "1px solid rgba(242,237,228,0.05)" }}>
            <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
              <div style={{ width: 28, height: 28, borderRadius: 999, background: "#efece6" }} />
              <span style={{ fontSize: 13.5, fontWeight: 500 }}>{c[0]}</span>
            </div>
            <span style={{ fontSize: 12.5, color: "rgba(242,237,228,0.65)" }}>{c[1]}</span>
            <span style={{ fontSize: 12, color: TEAL_BRIGHT, fontFamily: "'JetBrains Mono', monospace" }}>{c[2]}</span>
            <span style={{ fontSize: 12, fontFamily: "'JetBrains Mono', monospace" }}>{c[3]}</span>
            <span style={{ fontSize: 12, fontFamily: "'JetBrains Mono', monospace", color: c[4] === "—" ? "rgba(242,237,228,0.4)" : INK }}>{c[4]}</span>
            <span style={{ fontSize: 12.5, fontFamily: "'JetBrains Mono', monospace" }}>{c[5]}</span>
            <Sparkline data={c[6]} />
            {c[7] && <Pill tone={c[7] === "FLAG" ? "done" : "teal"}>{c[7]}</Pill>}
          </div>
        ))}
      </Card>
    </DashPage>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<NutritionistClientsPage />);
</script>
<script src="mobilePreview.js"></script>
</body>
</html>
