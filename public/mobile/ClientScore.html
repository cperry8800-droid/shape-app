<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Score · Shape</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>html,body{margin:0;padding:0;background:#1a1612}*{box-sizing:border-box}a{text-decoration:none;color:inherit}</style>
<link rel="stylesheet" href="mobilePreview.css" />
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="pageShell.jsx"></script>
<script type="text/babel" src="chatWidget.jsx"></script>
<script type="text/babel" src="clientChatThreads.jsx"></script>
<script type="text/babel" src="trainerDashboard.jsx"></script>
<script type="text/babel" src="clientNav.jsx"></script>
<script type="text/babel">
function ClientScorePage() {
  const tiers = [
    ["Raw",    "0 – 500",     "Starting out",           false],
    ["Tempo",  "500 – 1,500", "Building rhythm",         true],
    ["Peak",   "1,500 – 3,000","Consistent performer",  false],
    ["Legend", "3,000+",      "Top 1%",                 false],
  ];
  const breakdown = [
    ["Workouts logged",   420, "14d streak · +8 this week"],
    ["Plan adherence",    280, "92% · last 30d"],
    ["PRs hit",           180, "4 this quarter"],
    ["Community",          84, "12 posts, 38 kudos"],
    ["Coach endorsements",160, "Maya + Rae weekly"],
    ["Radio participation",60, "4 rooms joined"],
    ["Referrals",         100, "2 friends on Shape"],
  ];
  const total = breakdown.reduce((a, b) => a + b[1], 0);
  return (
    <DashPage
      navItems={clientNavItems("score")}
      payoutCard={clientPayoutCard}
      eyebrow="SHAPE SCORE · UPDATED NIGHTLY"
      title="1,284"
      subtitle="You're in Tempo. 216 points to Peak — that's about 4 weeks at your current pace."
      actions={<>
        <button style={{ background: "transparent", color: INK, border: "1px solid rgba(242,237,228,0.25)", padding: "10px 20px", borderRadius: 999, fontFamily: sans, fontSize: 13, cursor: "pointer" }}>How it works</button>
        <button style={{ background: INK, color: PAPER, border: 0, padding: "10px 22px", borderRadius: 999, fontFamily: sans, fontSize: 13, fontWeight: 500, cursor: "pointer" }}>Leaderboard</button>
      </>}
    >
      {/* Tier ladder */}
      <Card style={{ marginBottom: 20 }}>
        <SectionTitle right="YOU ARE HERE · TEMPO">Tiers</SectionTitle>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 0, position: "relative", marginTop: 8 }}>
          {tiers.map(([t, r, d, cur], i) => (
            <div key={t} style={{ padding: "18px 16px", borderLeft: i === 0 ? "none" : "1px solid rgba(242,237,228,0.08)", background: cur ? "rgba(30,192,168,0.08)" : "transparent" }}>
              <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: "0.14em", color: cur ? TEAL_BRIGHT : "rgba(242,237,228,0.45)", marginBottom: 6 }}>{r}</div>
              <div style={{ fontFamily: serif, fontSize: 26, letterSpacing: "-0.015em", color: cur ? INK : "rgba(242,237,228,0.6)" }}>{t}</div>
              <div style={{ fontSize: 11.5, color: "rgba(242,237,228,0.55)", marginTop: 4 }}>{d}</div>
            </div>
          ))}
        </div>
        <div style={{ marginTop: 22, display: "flex", justifyContent: "space-between", fontSize: 11, color: "rgba(242,237,228,0.55)", fontFamily: "'JetBrains Mono', monospace" }}>
          <span>1,284</span><span>PEAK AT 1,500</span>
        </div>
        <div style={{ height: 6, background: "rgba(242,237,228,0.08)", borderRadius: 999, overflow: "hidden", marginTop: 6 }}>
          <div style={{ height: "100%", width: "85%", background: TEAL, borderRadius: 999 }} />
        </div>
      </Card>

      <div style={{ display: "grid", gridTemplateColumns: "1.5fr 1fr", gap: 20 }}>
        <Card>
          <SectionTitle right={`TOTAL ${total.toLocaleString()}`}>Score breakdown</SectionTitle>
          {breakdown.map(([l, v, sub], i) => {
            const w = (v / Math.max(...breakdown.map(b => b[1]))) * 100;
            return (
              <div key={i} style={{ padding: "14px 0", borderTop: i === 0 ? "none" : "1px solid rgba(242,237,228,0.06)" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
                  <div style={{ fontSize: 14, fontWeight: 500 }}>{l}</div>
                  <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 13, color: TEAL_BRIGHT }}>+{v}</div>
                </div>
                <div style={{ fontSize: 11.5, color: "rgba(242,237,228,0.5)", marginBottom: 8 }}>{sub}</div>
                <div style={{ height: 3, background: "rgba(242,237,228,0.06)", borderRadius: 999, overflow: "hidden" }}>
                  <div style={{ height: "100%", width: `${w}%`, background: TEAL }} />
                </div>
              </div>
            );
          })}
        </Card>

        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <Card>
            <SectionTitle>This week's gains</SectionTitle>
            <div style={{ fontFamily: serif, fontSize: 44, letterSpacing: "-0.02em", lineHeight: 1 }}>+84</div>
            <div style={{ fontSize: 12, color: "rgba(242,237,228,0.55)", marginTop: 8 }}>vs 62 last week</div>
            <div style={{ marginTop: 16, paddingTop: 14, borderTop: "1px solid rgba(242,237,228,0.08)", display: "grid", gap: 8, fontSize: 12 }}>
              <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: "rgba(242,237,228,0.55)" }}>4 workouts logged</span><span>+32</span></div>
              <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: "rgba(242,237,228,0.55)" }}>Squat PR</span><span>+40</span></div>
              <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: "rgba(242,237,228,0.55)" }}>Community kudos</span><span>+12</span></div>
            </div>
          </Card>
          <Card style={{ background: "rgba(30,192,168,0.06)", border: "1px solid rgba(30,192,168,0.25)" }}>
            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: "0.14em", color: TEAL_BRIGHT, marginBottom: 10 }}>SHORTEST PATH TO PEAK</div>
            <div style={{ fontSize: 14, lineHeight: 1.55, color: "rgba(242,237,228,0.85)" }}>3 more workouts + 1 PR this week gets you to 1,412. Keep adherence above 90% and you hit Peak in ~4 weeks.</div>
          </Card>
        </div>
      </div>
    </DashPage>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(
  <React.Fragment>
    <ClientScorePage />
    <ChatWidget tabs={clientChatTabs} />
  </React.Fragment>
);
</script>
<script src="mobilePreview.js"></script>
</body>
</html>
