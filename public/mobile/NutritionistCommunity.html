<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Community · Shape</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>html,body{margin:0;padding:0;background:#1a1612}*{box-sizing:border-box}a{text-decoration:none;color:inherit}</style>
<link rel="stylesheet" href="mobilePreview.css" />
</head>
<body><div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="pageShell.jsx"></script>
<script type="text/babel" src="trainerDashboard.jsx"></script>
<script type="text/babel" src="coachNav.jsx"></script>
<script type="text/babel">
function NutritionistCommunityPage() {
  const feed = [
    { who: "You", role: "Nutritionist · 1,940", time: "3h", body: "New template: post-run whey + oat shake. 30p / 60c / 4f. Sharing to anyone on endurance plans.", likes: 36, comments: 7, tag: "TEMPLATE" },
    { who: "Maya Okafor", role: "Trainer", time: "6h", body: "Looking for a nutritionist to pair with a client going into a 16-week lean bulk. Peak coaches only — DM me.", likes: 18, comments: 9, tag: "COLLAB" },
    { who: "Jomo Singh", role: "Physio", time: "1d", body: "Running a Radio session on inflammation + recovery nutrition next Tues. Co-host?", likes: 22, comments: 6, tag: "RADIO" },
  ];
  return (
    <DashPage
      navItems={nutriNavItems("community")}
      payoutCard={nutriPayoutCard}
      eyebrow="COACH COMMUNITY · 284 NUTRITIONISTS"
      title="Community"
      subtitle="Where Shape nutritionists swap templates, collaborate with trainers, and run Radio rooms for clients."
      actions={<>
        <button style={{ background: "transparent", color: INK, border: "1px solid rgba(242,237,228,0.25)", padding: "10px 20px", borderRadius: 999, fontFamily: sans, fontSize: 13, cursor: "pointer", whiteSpace: "nowrap" }}>Host Radio</button>
        <button style={{ background: INK, color: PAPER, border: 0, padding: "10px 22px", borderRadius: 999, fontFamily: sans, fontSize: 13, fontWeight: 500, cursor: "pointer", whiteSpace: "nowrap" }}>New post</button>
      </>}
    >
      <div style={{ display: "grid", gridTemplateColumns: "1.6fr 1fr", gap: 20 }}>
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          {feed.map((p, i) => (
            <Card key={i} style={{ padding: 22 }}>
              <div style={{ display: "flex", gap: 12, marginBottom: 14, alignItems: "center" }}>
                <div style={{ width: 40, height: 40, borderRadius: 999, background: "#efece6", flexShrink: 0 }} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                    <div style={{ fontSize: 14, fontWeight: 500 }}>{p.who}</div>
                    <div style={{ fontSize: 11, color: TEAL_BRIGHT, fontFamily: "'JetBrains Mono', monospace", letterSpacing: "0.04em" }}>{p.role}</div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 4 }}>
                    <span style={{ fontSize: 11, color: "rgba(242,237,228,0.45)" }}>{p.time}</span>
                    <span style={{ width: 3, height: 3, borderRadius: 999, background: "rgba(242,237,228,0.25)" }} />
                    <Pill>{p.tag}</Pill>
                  </div>
                </div>
              </div>
              <div style={{ fontSize: 14.5, lineHeight: 1.55, color: "rgba(242,237,228,0.9)" }}>{p.body}</div>
              <div style={{ marginTop: 14, paddingTop: 12, borderTop: "1px solid rgba(242,237,228,0.06)", display: "flex", gap: 20, fontSize: 12, color: "rgba(242,237,228,0.55)", fontFamily: "'JetBrains Mono', monospace", letterSpacing: "0.04em" }}>
                <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 10.2S1.5 7.5 1.5 4.5a2.5 2.5 0 0 1 4.5-1.5 2.5 2.5 0 0 1 4.5 1.5c0 3-4.5 5.7-4.5 5.7Z" stroke="currentColor" strokeWidth="1.1" strokeLinejoin="round"/></svg>{p.likes}</span>
                <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 5.5a3 3 0 0 1 3-3h4a2 2 0 0 1 2 2v2a2 2 0 0 1-2 2H5l-2.5 2V7a2.5 2.5 0 0 1-.5-1.5Z" stroke="currentColor" strokeWidth="1.1" strokeLinejoin="round"/></svg>{p.comments} replies</span>
              </div>
            </Card>
          ))}
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <Card>
            <SectionTitle>Trending topics</SectionTitle>
            {["Post-run fueling","Plant-forward protein","Race-day carbs","Sleep + nutrition","Cut adherence"].map((t,i)=>(
              <div key={i} style={{ padding: "12px 0", borderTop: i === 0 ? "none" : "1px solid rgba(242,237,228,0.06)", display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 12, fontSize: 13 }}>
                <span style={{ color: "rgba(242,237,228,0.85)" }}>#{t.toLowerCase().replace(/ /g,"-")}</span>
                <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: "rgba(242,237,228,0.5)", flexShrink: 0 }}>{[62,48,34,28,22][i]}</span>
              </div>
            ))}
          </Card>
          <Card style={{ background: "rgba(30,192,168,0.06)", border: "1px solid rgba(30,192,168,0.25)" }}>
            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: "0.14em", color: TEAL_BRIGHT, marginBottom: 8 }}>SHAPE RADIO</div>
            <div style={{ fontFamily: serif, fontSize: 20, letterSpacing: "-0.01em", marginBottom: 6 }}>Host your first room</div>
            <div style={{ fontSize: 12.5, color: "rgba(242,237,228,0.65)", lineHeight: 1.5 }}>Live Q&amp;A with clients + coaches. Counts toward your Score.</div>
            <button style={{ marginTop: 14, width: "100%", background: PAPER, color: INK, border: 0, padding: "9px 0", borderRadius: 999, fontSize: 13, fontWeight: 500, cursor: "pointer", fontFamily: sans }}>Schedule room</button>
          </Card>
        </div>
      </div>
    </DashPage>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<NutritionistCommunityPage />);
</script>
<script src="mobilePreview.js"></script>
</body>
</html>
