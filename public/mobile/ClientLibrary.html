<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Library · Shape</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>html,body{margin:0;padding:0;background:#1a1612}*{box-sizing:border-box}a{text-decoration:none;color:inherit}</style>
<link rel="stylesheet" href="mobilePreview.css" />
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="pageShell.jsx"></script>
<script type="text/babel" src="chatWidget.jsx"></script>
<script type="text/babel" src="clientChatThreads.jsx"></script>
<script type="text/babel" src="trainerDashboard.jsx"></script>
<script type="text/babel" src="clientNav.jsx"></script>
<script type="text/babel">
function ClientLibraryPage() {
  const collections = [
    { title: "Exercise form library", sub: "124 videos · Maya", tag: "TRAINING", items: 124 },
    { title: "Post-run fueling shakes", sub: "3 templates · Rae", tag: "NUTRITION", items: 3 },
    { title: "Sleep + recovery protocol", sub: "8 articles · Rae", tag: "RECOVERY", items: 8 },
    { title: "Mobility flows", sub: "12 videos · Maya", tag: "TRAINING", items: 12 },
    { title: "Meal-prep sundays", sub: "6 recipes · Rae", tag: "NUTRITION", items: 6 },
    { title: "Race-day checklists", sub: "2 docs · Diego", tag: "RACING", items: 2 },
  ];
  const recent = [
    ["VIDEO", "Bench press setup — 4 cues",  "Maya · 3:12",     "Apr 16"],
    ["DOC",   "Sleep protocol v2",           "Rae · 4 min read", "Apr 14"],
    ["RECIPE","Salmon + sweet potato bowl",  "Rae",              "Apr 12"],
    ["VIDEO", "RDL — hip hinge breakdown",   "Maya · 2:40",     "Apr 10"],
    ["DOC",   "Deload week — how I program","Maya · 6 min read","Apr 8"],
  ];
  return (
    <DashPage
      navItems={clientNavItems("library")}
      payoutCard={clientPayoutCard}
      eyebrow="FROM YOUR TEAM"
      title="Library"
      subtitle="Videos, protocols, recipes and checklists your coaches have shared. New additions appear at the top."
      actions={<>
        <button style={{ background: "transparent", color: INK, border: "1px solid rgba(242,237,228,0.25)", padding: "10px 20px", borderRadius: 999, fontFamily: sans, fontSize: 13, cursor: "pointer" }}>Search</button>
        <button style={{ background: INK, color: PAPER, border: 0, padding: "10px 22px", borderRadius: 999, fontFamily: sans, fontSize: 13, fontWeight: 500, cursor: "pointer" }}>Saved (14)</button>
      </>}
    >
      <div style={{ marginBottom: 24, display: "flex", gap: 8, fontSize: 12, fontFamily: "'JetBrains Mono', monospace", letterSpacing: "0.08em" }}>
        {["ALL","TRAINING","NUTRITION","RECOVERY","RACING"].map((t, i) => (
          <span key={t} style={{ padding: "6px 12px", borderRadius: 999, background: i === 0 ? "rgba(30,192,168,0.16)" : "rgba(242,237,228,0.04)", color: i === 0 ? TEAL_BRIGHT : "rgba(242,237,228,0.6)", border: "1px solid " + (i === 0 ? "rgba(30,192,168,0.3)" : "rgba(242,237,228,0.08)") }}>{t}</span>
        ))}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 16, marginBottom: 20 }}>
        {collections.map((c, i) => (
          <Card key={i} style={{ padding: 22, cursor: "pointer" }}>
            <div style={{ height: 120, borderRadius: 6, background: `linear-gradient(135deg, rgba(30,192,168,0.15), rgba(242,237,228,0.06))`, marginBottom: 14, display: "flex", alignItems: "flex-end", padding: 12 }}>
              <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10, letterSpacing: "0.12em", color: TEAL_BRIGHT }}>{c.tag}</div>
            </div>
            <div style={{ fontFamily: serif, fontSize: 20, letterSpacing: "-0.015em", marginBottom: 4 }}>{c.title}</div>
            <div style={{ fontSize: 12, color: "rgba(242,237,228,0.55)" }}>{c.sub}</div>
          </Card>
        ))}
      </div>

      <Card>
        <SectionTitle right="LAST 30 DAYS">Recently added</SectionTitle>
        {recent.map((r, i) => (
          <div key={i} style={{ display: "grid", gridTemplateColumns: "80px 1fr 140px 80px", gap: 14, alignItems: "center", padding: "14px 4px", borderTop: i === 0 ? "none" : "1px solid rgba(242,237,228,0.06)" }}>
            <Pill>{r[0]}</Pill>
            <div style={{ fontSize: 14, fontWeight: 500 }}>{r[1]}</div>
            <div style={{ fontSize: 12, color: "rgba(242,237,228,0.55)" }}>{r[2]}</div>
            <div style={{ fontSize: 12, color: "rgba(242,237,228,0.45)", textAlign: "right", fontFamily: "'JetBrains Mono', monospace" }}>{r[3]}</div>
          </div>
        ))}
      </Card>
    </DashPage>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(
  <React.Fragment>
    <ClientLibraryPage />
    <ChatWidget tabs={clientChatTabs} />
  </React.Fragment>
);
</script>
<script src="mobilePreview.js"></script>
</body>
</html>
