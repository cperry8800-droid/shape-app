// ─── helpers ────────────────────────────────────────────
function shade(hex, amt) {
  // amt in [-1, 1]. negative = darker, positive = lighter
  const c = hex.replace('#','');
  const n = c.length === 3 ? c.split('').map(x=>x+x).join('') : c;
  const r = parseInt(n.slice(0,2),16), g = parseInt(n.slice(2,4),16), b = parseInt(n.slice(4,6),16);
  const mix = (v) => Math.max(0, Math.min(255, Math.round(v + (amt < 0 ? v*amt : (255-v)*amt))));
  const toHex = (v) => v.toString(16).padStart(2,'0');
  return '#' + toHex(mix(r)) + toHex(mix(g)) + toHex(mix(b));
}

// ─── logo embroidery renderer ───────────────────────────
// Handles mark variant (full/wordmark/triangles) via CSS clip + tone via filter.
function LogoPatch({ treatment, variant, size, emb }) {
  const src = treatment.src;
  // The source PNG is 187x100. Triangles occupy ~top 58% (y 0–58),
  // wordmark the bottom ~42% (y 58–100). We render via a <div> with
  // background-image so we can independently clip.
  const ASPECT = 187 / 100;
  const fullH  = size;
  let boxW, boxH, bgW, bgH, bgX, bgY;
  if (variant === 'full') {
    boxH = fullH; boxW = fullH * ASPECT;
    bgW = boxW; bgH = boxH; bgX = 0; bgY = 0;
  } else if (variant === 'wordmark') {
    // show only bottom 42% of image
    boxH = fullH * 0.38;          // target rendered height
    // we need the full image drawn at source scale so cropping works.
    bgH  = boxH / 0.38;           // total image height so our slice = boxH
    bgW  = bgH * ASPECT;
    boxW = bgW * 0.92;            // wordmark occupies full width
    bgX  = -(bgW - boxW) / 2;
    bgY  = -bgH * 0.58;           // shift up past triangles
  } else {
    // triangles: top 58% of image; but triangles are narrow, centered
    boxH = fullH;
    bgH  = boxH / 0.58;
    bgW  = bgH * ASPECT;
    // triangle cluster spans roughly the middle 26% width of the image
    boxW = bgW * 0.26;
    bgX  = -(bgW - boxW) / 2;
    bgY  = 0;
  }

  // Tone / filter. For 'color' treatments keep as-is. For mono, use filter chain
  // to force a single color without altering shape.
  let toneFilter = '';
  if (treatment.tone === 'mono') {
    // Convert to pure black, then tint with drop-shadow of the target color,
    // then null out original via 0-opacity. We can't 'fill' a PNG so instead:
    // use filter: brightness(0) then drop-shadow(0 0 0 color) + contrast bump.
    // Simpler route: for white target, use `brightness(0) invert(1)`.
    // For colored targets, layer a CSS mask.
    // Cheap path: use mask-image (supported everywhere in modern browsers).
  }

  // Embroidery treatment styles
  const embShadow =
    emb === 'puff'
      ? 'drop-shadow(0 2px 0 rgba(0,0,0,0.5)) drop-shadow(0 3px 2px rgba(0,0,0,0.35)) drop-shadow(0 0 0.5px rgba(255,255,255,0.5))'
      : emb === 'flat'
        ? 'drop-shadow(0 1px 0 rgba(0,0,0,0.35)) drop-shadow(0 0 0.4px rgba(0,0,0,0.4))'
        : 'none';

  // The mark itself — use a mask if mono, plain bg-image if color.
  const markStyle = treatment.tone === 'mono'
    ? {
        width: boxW, height: boxH,
        WebkitMaskImage: `url(${src})`, maskImage: `url(${src})`,
        WebkitMaskRepeat: 'no-repeat', maskRepeat: 'no-repeat',
        WebkitMaskSize: `${bgW}px ${bgH}px`, maskSize: `${bgW}px ${bgH}px`,
        WebkitMaskPosition: `${bgX}px ${bgY}px`, maskPosition: `${bgX}px ${bgY}px`,
        background: treatment.mono,
        filter: embShadow !== 'none' ? embShadow : undefined,
      }
    : {
        width: boxW, height: boxH,
        backgroundImage: `url(${src})`, backgroundRepeat: 'no-repeat',
        backgroundSize: `${bgW}px ${bgH}px`,
        backgroundPosition: `${bgX}px ${bgY}px`,
        filter: embShadow !== 'none' ? embShadow : undefined,
      };

  const mark = <div style={markStyle} />;

  if (emb === 'patch') {
    return (
      <div style={{
        padding: '10px 14px',
        background: '#f2ebd9',
        border: '2px solid #1a1a1c',
        borderRadius: 4,
        boxShadow: '0 3px 0 rgba(0,0,0,0.35), 0 6px 8px rgba(0,0,0,0.25), inset 0 0 0 1px rgba(0,0,0,0.15)',
        position: 'relative',
      }}>
        {/* re-tone to black for patch regardless of treatment */}
        <div style={{
          width: boxW, height: boxH,
          WebkitMaskImage: `url(${src})`, maskImage: `url(${src})`,
          WebkitMaskRepeat: 'no-repeat', maskRepeat: 'no-repeat',
          WebkitMaskSize: `${bgW}px ${bgH}px`, maskSize: `${bgW}px ${bgH}px`,
          WebkitMaskPosition: `${bgX}px ${bgY}px`, maskPosition: `${bgX}px ${bgY}px`,
          background: '#1a1a1c',
        }} />
      </div>
    );
  }

  return mark;
}

// ─── main ───────────────────────────────────────────────
function HatStudio() {
  const [silhouette, setSilhouette] = useState('runner');
  const [crownId, setCrownId] = useState('black');
  const [brimMatch, setBrimMatch] = useState(true);
  const [brimId, setBrimId] = useState('cream');
  const [logoId, setLogoId] = useState('color-white');
  const [markVariant, setMarkVariant] = useState('full');
  const [emb, setEmb] = useState('flat');
  const [logoSize, setLogoSize] = useState(64);
  const [fabric, setFabric] = useState('stretch');
  const [features, setFeatures] = useState({ sweatband: true, vent: true, reflect: false, strap: true });

  const crown = CROWN_COLORS.find(c => c.id === crownId);
  const brim  = brimMatch ? crown : CROWN_COLORS.find(c => c.id === brimId);
  const logo  = LOGO_TREATMENTS.find(l => l.id === logoId);
  const stitch = useMemo(() => {
    // readable stitch color against crown
    const hex = crown.hex.replace('#','');
    const r = parseInt(hex.slice(0,2),16), g = parseInt(hex.slice(2,4),16), b = parseInt(hex.slice(4,6),16);
    const luma = (0.2126*r + 0.7152*g + 0.0722*b);
    return luma > 160 ? 'rgba(0,0,0,0.5)' : 'rgba(255,255,255,0.65)';
  }, [crown]);

  const props = { crown: crown.hex, brim: brim.hex, stitch, features, fabric };
  const Hat =
    silhouette === 'runner'  ? Runner :
    silhouette === 'dad'     ? DadCap :
    silhouette === 'snap'    ? Snapback :
    silhouette === 'trucker' ? Trucker : Beanie;

  let logoHeight = logoSize;
  if (silhouette === 'beanie') logoHeight = Math.round(logoSize * 0.75);
  if (silhouette === 'runner') logoHeight = Math.round(logoSize * 0.95);
  if (markVariant === 'triangles') logoHeight = Math.round(logoHeight * 1.25);
  if (markVariant === 'wordmark')  logoHeight = Math.round(logoHeight * 1.15);

  const priceByFabric = { twill: 48, ripstop: 56, stretch: 58, perf: 64 };
  const price = priceByFabric[fabric] ?? 48;
  const markLabel = MARK_VARIANTS.find(m=>m.id===markVariant).name.toUpperCase();

  const styleCode = `SHAPE · ${SILHOUETTES.find(s=>s.id===silhouette).name.toUpperCase()} · ${FABRICS.find(f=>f.id===fabric).name.toUpperCase()} · ${crown.name.toUpperCase()}${brimMatch ? '' : ' / ' + brim.name.toUpperCase()} · ${markLabel}`;

  function toggleFeat(k) { setFeatures(f => ({ ...f, [k]: !f[k] })); }

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
      {/* header */}
      <header style={{
        padding: '22px 32px 18px', borderBottom: `1px solid ${HAIR}`,
        display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 20,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
          <img src="assets/shape-logo-new-black.png" alt="Shape" style={{ height: 24, width: 'auto' }} />
          <div style={{ width: 1, height: 18, background: HAIR }} />
          <div style={{ fontFamily: MONO, fontSize: 11, letterSpacing: '0.18em', color: INK60 }}>HAT STUDIO — ED. 01</div>
        </div>
        <div style={{ fontFamily: MONO, fontSize: 10, letterSpacing: '0.2em', color: INK35 }}>APR 2026 · MADE TO ORDER</div>
      </header>

      {/* body */}
      <main style={{
        flex: 1, display: 'grid', gridTemplateColumns: 'minmax(0,1.3fr) 360px',
        gap: 0, alignItems: 'stretch',
      }}>
        {/* ── stage ─────────────────────────── */}
        <section style={{ padding: '48px 56px', position: 'relative', background: PAPER, display: 'flex', flexDirection: 'column' }}>
          {/* editorial title */}
          <div style={{ maxWidth: 640, marginBottom: 32 }}>
            <div style={{ fontFamily: MONO, fontSize: 10.5, letterSpacing: '0.22em', color: TEAL_DEEP, marginBottom: 10 }}>
              NO. 01 / DESIGN YOUR OWN
            </div>
            <h1 style={{
              margin: 0, fontFamily: SERIF, fontWeight: 400, fontSize: 68,
              lineHeight: 0.95, letterSpacing: '-0.02em', color: INK,
            }}>
              A hat, <em style={{ fontStyle: 'italic', color: TEAL_DEEP, fontWeight: 500 }}>engineered to train in.</em>
            </h1>
            <p style={{ marginTop: 14, fontFamily: SANS, fontSize: 15, color: INK60, maxWidth: 520, lineHeight: 1.5 }}>
              Built for reps, miles and sweat. Pick the silhouette and fabric, dial the colorway, and choose how the mark sits on the crown — full lockup, wordmark only, or just the triangles. We stitch one, hand-finish it, and send it in a week.
            </p>
          </div>

          {/* the hat */}
          <div style={{
            flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center',
            position: 'relative', minHeight: 420,
          }}>
            {/* decorative serif number */}
            <div style={{
              position: 'absolute', top: -10, right: -20,
              fontFamily: SERIF, fontStyle: 'italic', fontWeight: 300,
              fontSize: 220, color: 'rgba(26,26,28,0.05)', lineHeight: 1, userSelect: 'none',
            }}>
              01
            </div>
            <div style={{ width: '100%', maxWidth: 720, position: 'relative' }}>
              <Hat {...props}>
                <LogoPatch treatment={logo} variant={markVariant} size={logoHeight} emb={emb} />
              </Hat>
            </div>
          </div>

          {/* spec rail */}
          <div style={{
            marginTop: 12, paddingTop: 18, borderTop: `1px solid ${HAIR}`,
            display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 20,
            fontFamily: MONO, fontSize: 10.5, letterSpacing: '0.14em', color: INK60,
          }}>
            <div>{styleCode}</div>
            <div style={{ display: 'flex', gap: 24 }}>
              <span>${price}</span>
              <span style={{ color: INK35 }}>· ships 5–7 days</span>
            </div>
          </div>
        </section>

        {/* ── controls ─────────────────────── */}
        <aside style={{
          background: PAPER2, borderLeft: `1px solid ${HAIR}`,
          padding: '40px 32px', display: 'flex', flexDirection: 'column', gap: 28,
          overflowY: 'auto',
        }}>
          <Group label="Silhouette" n="01">
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
              {SILHOUETTES.map(s => (
                <TileBtn key={s.id} active={silhouette===s.id} onClick={() => setSilhouette(s.id)}>
                  <div style={{ fontFamily: SERIF, fontSize: 18, fontStyle: silhouette===s.id?'italic':'normal' }}>{s.name}</div>
                  <div style={{ fontFamily: MONO, fontSize: 9.5, letterSpacing: '0.1em', color: INK60, marginTop: 4 }}>{s.sub}</div>
                </TileBtn>
              ))}
            </div>
          </Group>

          <Group label="Fabric" n="02">
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
              {FABRICS.map(f => (
                <TileBtn key={f.id} active={fabric===f.id} onClick={() => setFabric(f.id)}>
                  <div style={{ fontFamily: SERIF, fontSize: 16, fontStyle: fabric===f.id?'italic':'normal' }}>{f.name}</div>
                  <div style={{ fontFamily: MONO, fontSize: 9, letterSpacing: '0.1em', color: INK60, marginTop: 3 }}>{f.sub}</div>
                </TileBtn>
              ))}
            </div>
          </Group>

          <Group label="Crown color" n="03">
            <Swatches items={CROWN_COLORS} active={crownId} onPick={setCrownId} />
          </Group>

          <Group label="Brim / cuff" n="04">
            <div style={{ display: 'flex', gap: 6, marginBottom: 10 }}>
              <Seg active={brimMatch} onClick={() => setBrimMatch(true)}>Match crown</Seg>
              <Seg active={!brimMatch} onClick={() => setBrimMatch(false)}>Contrast</Seg>
            </div>
            {!brimMatch && <Swatches items={CROWN_COLORS} active={brimId} onPick={setBrimId} />}
          </Group>

          <Group label="Mark" n="05">
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 6, marginBottom: 10 }}>
              {MARK_VARIANTS.map(m => (
                <button key={m.id} onClick={() => setMarkVariant(m.id)} style={{
                  padding: '10px 6px', borderRadius: 6,
                  border: `1px solid ${markVariant===m.id ? INK : HAIR}`,
                  background: markVariant===m.id ? INK : '#fff',
                  color: markVariant===m.id ? '#fff' : INK,
                  display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, cursor: 'pointer',
                }}>
                  <MarkThumb variant={m.id} dark={markVariant===m.id} />
                  <span style={{ fontFamily: MONO, fontSize: 9, letterSpacing: '0.1em' }}>{m.name.toUpperCase()}</span>
                </button>
              ))}
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 6, marginBottom: 10 }}>
              {LOGO_TREATMENTS.map(l => (
                <button key={l.id} onClick={() => setLogoId(l.id)} title={l.name} style={{
                  padding: '8px 4px', borderRadius: 6,
                  border: `1px solid ${logoId===l.id ? INK : HAIR}`,
                  background: logoId===l.id ? INK : '#fff',
                  color: logoId===l.id ? '#fff' : INK,
                  display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3, cursor: 'pointer',
                }}>
                  <ColorSwatch treatment={l} />
                  <span style={{ fontFamily: MONO, fontSize: 8.5, letterSpacing: '0.08em' }}>{l.name.toUpperCase()}</span>
                </button>
              ))}
            </div>
            <Row>
              <div style={labelS}>Emb.</div>
              <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
                {EMBROIDERY.map(e => (
                  <Seg key={e.id} active={emb===e.id} onClick={() => setEmb(e.id)}>{e.name}</Seg>
                ))}
              </div>
            </Row>
            <Row>
              <div style={labelS}>Size</div>
              <input type="range" min={40} max={96} value={logoSize} onChange={e => setLogoSize(+e.target.value)}
                style={{ flex: 1, accentColor: TEAL_DEEP }} />
              <div style={{ fontFamily: MONO, fontSize: 10, color: INK60, width: 40, textAlign: 'right' }}>{logoSize}mm</div>
            </Row>
          </Group>

          <Group label="Features" n="06">
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6 }}>
              <FeatBtn on={features.sweatband} onClick={() => toggleFeat('sweatband')} label="Sweatband" sub="Moisture-wicking" />
              <FeatBtn on={features.vent}      onClick={() => toggleFeat('vent')}      label="Ventilation"  sub="Eyelets + perf" />
              <FeatBtn on={features.reflect}   onClick={() => toggleFeat('reflect')}   label="Reflective"   sub="Night visibility" />
              <FeatBtn on={features.strap}     onClick={() => toggleFeat('strap')}     label="Strapback"    sub="Adjustable" />
            </div>
          </Group>

          <div style={{ flex: 1 }} />

          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            <button style={{
              background: INK, color: '#fff', border: 0, padding: '16px 18px', borderRadius: 10,
              fontFamily: SANS, fontSize: 14, fontWeight: 600, letterSpacing: '0.01em',
              display: 'flex', justifyContent: 'space-between', alignItems: 'center',
            }}>
              <span>Add to cart · 1</span>
              <span style={{ fontFamily: MONO, fontSize: 12, opacity: 0.7 }}>${price}</span>
            </button>
            <button style={{
              background: 'transparent', color: INK, border: `1px solid ${HAIR}`,
              padding: '12px 18px', borderRadius: 10,
              fontFamily: MONO, fontSize: 10.5, letterSpacing: '0.2em', fontWeight: 500,
            }}>
              SAVE DESIGN
            </button>
          </div>
        </aside>
      </main>
    </div>
  );
}

// ─── controls primitives ────────────────────────────────
const labelS = { fontFamily: MONO, fontSize: 10, letterSpacing: '0.14em', color: INK60, width: 76, flexShrink: 0 };

function Group({ label, n, children }) {
  return (
    <div>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 10, marginBottom: 12 }}>
        <span style={{ fontFamily: MONO, fontSize: 10, letterSpacing: '0.18em', color: INK35 }}>{n}</span>
        <span style={{ fontFamily: SERIF, fontSize: 20, color: INK }}>{label}</span>
      </div>
      {children}
    </div>
  );
}

function TileBtn({ active, onClick, children }) {
  return (
    <button onClick={onClick} style={{
      textAlign: 'left', padding: '12px 12px', borderRadius: 8,
      border: `1px solid ${active ? INK : HAIR}`,
      background: active ? '#fff' : 'rgba(255,255,255,0.5)',
      boxShadow: active ? '0 0 0 2px rgba(10,143,128,0.2)' : 'none',
      cursor: 'pointer',
    }}>
      {children}
    </button>
  );
}

function Swatches({ items, active, onPick }) {
  const cur = items.find(i => i.id === active);
  return (
    <div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(8, 1fr)', gap: 6 }}>
        {items.map(i => (
          <button key={i.id} onClick={() => onPick(i.id)}
            title={i.name}
            style={{
              aspectRatio: '1', borderRadius: 999, background: i.hex,
              border: active===i.id ? `2px solid ${INK}` : `1px solid ${HAIR}`,
              boxShadow: active===i.id ? '0 0 0 2px #fff inset' : 'none',
              cursor: 'pointer', padding: 0,
            }}
          />
        ))}
      </div>
      {cur && <div style={{ marginTop: 8, fontFamily: MONO, fontSize: 10, letterSpacing: '0.12em', color: INK60 }}>
        {cur.name.toUpperCase()} · {cur.hex.toUpperCase()}
      </div>}
    </div>
  );
}

function Seg({ active, onClick, children }) {
  return (
    <button onClick={onClick} style={{
      padding: '6px 10px', borderRadius: 6, border: `1px solid ${active ? INK : HAIR}`,
      background: active ? INK : 'transparent', color: active ? '#fff' : INK,
      fontFamily: MONO, fontSize: 9.5, letterSpacing: '0.14em', fontWeight: 500,
      cursor: 'pointer',
    }}>
      {children}
    </button>
  );
}

function Row({ children }) {
  return <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginTop: 10 }}>{children}</div>;
}

// Tiny preview of which part of the mark is selected
function MarkThumb({ variant, dark }) {
  const stroke = dark ? '#fff' : INK;
  const fill = dark ? '#fff' : INK;
  return (
    <svg width="34" height="18" viewBox="0 0 34 18">
      {(variant === 'full' || variant === 'triangles') && (
        <g>
          <path d="M 14 2 L 18 8 L 10 8 Z" fill="none" stroke={stroke} strokeWidth="1" />
          <path d="M 14 3 L 17 7.5 L 11 7.5 Z" fill={dark ? TEAL : TEAL_DEEP} opacity={variant==='triangles'?1:0.9} />
          <path d="M 21 1 L 24 5.5 L 18 5.5 Z" fill={fill} />
        </g>
      )}
      {(variant === 'full' || variant === 'wordmark') && (
        <text x="17" y="16" textAnchor="middle" fontFamily={MONO} fontSize="5" letterSpacing="0.25em" fill={fill}>SHAPE</text>
      )}
    </svg>
  );
}

// Tiny color-swatch chip for logo treatment
function ColorSwatch({ treatment }) {
  const isColor = treatment.tone === 'color';
  const base = isColor ? (treatment.src.includes('white') ? '#fff' : '#111') : treatment.mono;
  return (
    <div style={{
      display: 'flex', gap: 2, alignItems: 'center', padding: 2,
      background: 'rgba(0,0,0,0.08)', borderRadius: 3,
    }}>
      <div style={{ width: 10, height: 10, borderRadius: 2, background: base, border: '1px solid rgba(0,0,0,0.15)' }} />
      {isColor && <div style={{ width: 10, height: 10, borderRadius: 2, background: TEAL_DEEP }} />}
    </div>
  );
}

function FeatBtn({ on, onClick, label, sub }) {
  return (
    <button onClick={onClick} style={{
      textAlign: 'left', padding: '10px 10px', borderRadius: 8,
      border: `1px solid ${on ? INK : HAIR}`,
      background: on ? '#fff' : 'rgba(255,255,255,0.4)',
      boxShadow: on ? `inset 3px 0 0 ${TEAL_DEEP}` : 'none',
      cursor: 'pointer', position: 'relative',
    }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 6 }}>
        <div style={{ fontFamily: SANS, fontSize: 12.5, fontWeight: 600, color: INK }}>{label}</div>
        <div style={{
          width: 14, height: 14, borderRadius: 3,
          border: `1.5px solid ${on ? TEAL_DEEP : INK35}`,
          background: on ? TEAL_DEEP : 'transparent',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          color: '#fff', fontSize: 9, lineHeight: 1,
        }}>{on ? '✓' : ''}</div>
      </div>
      <div style={{ fontFamily: MONO, fontSize: 9, letterSpacing: '0.08em', color: INK60, marginTop: 3 }}>{sub}</div>
    </button>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<HatStudio />);
</script>
