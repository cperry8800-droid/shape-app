<script type="text/babel" src="pageShell.jsx"></script>
<script type="text/babel" src="trainerDashboard.jsx"></script>

<script type="text/babel">

    ["Jaya Patel",       "Hybrid",            "Tempo · 1,102",  "9d",  "89%", "$200", "Brooklyn", [0.3,0.4,0.5,0.4,0.6,0.5,0.6], ""],

    <DashPage
      navItems={trainerNavItems("clients")}
      payoutCard={trainerPayoutCard}
      eyebrow="34 ACTIVE · 2 IN INTAKE · 1 FLAGGED"
      title="Clients"
      subtitle="Everyone you're coaching. Sort by streak, adherence, or revenue — or jump to anyone's program and logs."

            <span style={{ fontSize: 12, color: "rgba(242,237,228,0.6)" }}>{c[6]}</span>

            {c[8] && <Pill tone={c[8] === "FLAG" ? "done" : "teal"}>{c[8]}</Pill>}
          </div>
        ))}
      </Card>
    </DashPage>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<TrainerClientsPage />);
</script>
<script src="mobilePreview.js"></script>
