<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Messages · Shape</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>html,body{margin:0;padding:0;background:#1a1612}*{box-sizing:border-box}a{text-decoration:none;color:inherit}</style>
<link rel="stylesheet" href="mobilePreview.css" />
</head>
<body><div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="pageShell.jsx"></script>
<script type="text/babel" src="trainerDashboard.jsx"></script>
<script type="text/babel" src="coachNav.jsx"></script>
<script type="text/babel">
function TrainerMessagesPage() {
  const threads = [
    { who: "Priya Shah", last: "Got it, pushing 185 today.", time: "2m", unread: 0, active: true },
    { who: "Sam Okafor", last: "Onboarding Qs — attached.", time: "14m", unread: 2 },
    { who: "Marcus Johnson", last: "Video: bench cue?", time: "1h", unread: 1 },
    { who: "Elena Rivera", last: "Thanks! Feeling great.", time: "3h", unread: 0 },
    { who: "Jaya Patel", last: "Nutrition Q for Rae.", time: "Yesterday", unread: 0 },
    { who: "Ana Park", last: "Can we move Thursday?", time: "Yesterday", unread: 0 },
  ];
  const msgs = [
    { who: "Priya", t: "Morning — squat 185 feels heavy on warmups. Should I back off?", time: "8:54 AM", me: false },
    { who: "Maya", t: "Stick with 185 for top set. Drop backoffs to 165 — protect the knee.", time: "9:02 AM", me: true },
    { who: "Maya", t: "Also ice tonight and log sleep before Friday's call.", time: "9:02 AM", me: true },
    { who: "Priya", t: "Got it, pushing 185 today.", time: "9:14 AM", me: false },
  ];
  return (
    <DashPage
      navItems={trainerNavItems("messages")}
      payoutCard={trainerPayoutCard}
      eyebrow="3 UNREAD · 12 ACTIVE THREADS"
      title="Messages"
      subtitle="Every client thread in one place. Replies post to their Train tab with context about the session they're asking about."
      actions={<>
        <button style={{ background: "transparent", color: INK, border: "1px solid rgba(242,237,228,0.25)", padding: "10px 20px", borderRadius: 999, fontFamily: sans, fontSize: 13, cursor: "pointer" }}>Templates</button>
        <button style={{ background: INK, color: PAPER, border: 0, padding: "10px 22px", borderRadius: 999, fontFamily: sans, fontSize: 13, fontWeight: 500, cursor: "pointer" }}>Broadcast</button>
      </>}
    >
      <div style={{ display: "grid", gridTemplateColumns: "340px 1fr", gap: 20 }}>
        <Card style={{ padding: 0, overflow: "hidden" }}>
          <div style={{ padding: "18px 18px 10px" }}><SectionTitle>Inbox</SectionTitle></div>
          {threads.map((t, i) => (
            <div key={i} style={{ padding: "14px 18px", borderTop: i === 0 ? "none" : "1px solid rgba(242,237,228,0.05)", background: t.active ? "rgba(30,192,168,0.08)" : "transparent", cursor: "pointer", borderLeft: t.active ? `2px solid ${TEAL}` : "2px solid transparent" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                <div style={{ fontSize: 13.5, fontWeight: 500 }}>{t.who}</div>
                <div style={{ fontSize: 10, color: "rgba(242,237,228,0.45)", fontFamily: "'JetBrains Mono', monospace" }}>{t.time}</div>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", gap: 8 }}>
                <div style={{ fontSize: 12, color: "rgba(242,237,228,0.55)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.last}</div>
                {t.unread > 0 && <span style={{ background: TEAL, color: PAPER, fontSize: 10, fontFamily: "'JetBrains Mono', monospace", padding: "2px 6px", borderRadius: 999, minWidth: 18, textAlign: "center" }}>{t.unread}</span>}
              </div>
            </div>
          ))}
        </Card>

        <Card style={{ padding: 0, display: "flex", flexDirection: "column", height: 600 }}>
          <div style={{ padding: "18px 24px", borderBottom: "1px solid rgba(242,237,228,0.08)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ fontSize: 15, fontWeight: 500 }}>Priya Shah</div>
              <div style={{ fontSize: 11.5, color: "rgba(242,237,228,0.55)", marginTop: 2 }}>Tempo · on Strength + hybrid · next Thu 8am</div>
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button style={{ background: "transparent", color: PAPER, border: "1px solid rgba(242,237,228,0.2)", padding: "7px 14px", borderRadius: 999, fontSize: 12, cursor: "pointer" }}>View program</button>
              <button style={{ background: "transparent", color: PAPER, border: "1px solid rgba(242,237,228,0.2)", padding: "7px 14px", borderRadius: 999, fontSize: 12, cursor: "pointer" }}>Logs</button>
            </div>
          </div>
          <div style={{ flex: 1, padding: 24, overflowY: "auto", display: "flex", flexDirection: "column", gap: 12 }}>
            {msgs.map((m, i) => (
              <div key={i} style={{ display: "flex", justifyContent: m.me ? "flex-end" : "flex-start" }}>
                <div style={{ maxWidth: "68%", background: m.me ? TEAL : "rgba(242,237,228,0.06)", color: m.me ? PAPER : INK, padding: "10px 14px", borderRadius: 14, fontSize: 13.5, lineHeight: 1.5 }}>
                  {m.t}
                  <div style={{ fontSize: 10, color: m.me ? "rgba(26,22,18,0.5)" : "rgba(242,237,228,0.4)", marginTop: 4, fontFamily: "'JetBrains Mono', monospace" }}>{m.time}</div>
                </div>
              </div>
            ))}
          </div>
          <div style={{ padding: 18, borderTop: "1px solid rgba(242,237,228,0.08)", display: "flex", gap: 10 }}>
            <input placeholder="Write to Priya…" style={{ flex: 1, background: "rgba(242,237,228,0.04)", border: "1px solid rgba(242,237,228,0.1)", padding: "10px 14px", borderRadius: 999, color: INK, fontSize: 13, outline: "none", fontFamily: sans }} />
            <button style={{ background: INK, color: PAPER, border: 0, padding: "10px 20px", borderRadius: 999, fontSize: 13, fontWeight: 500, cursor: "pointer" }}>Send</button>
          </div>
        </Card>
      </div>
    </DashPage>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<TrainerMessagesPage />);
</script>
<script src="mobilePreview.js"></script>
</body>
</html>
